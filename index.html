<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Time</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --navy:#0f1e3d; --navy2:#1b3a6b; --accent:#3b82f6; --accent2:#60a5fa;
  --bg:#f4f6fb; --card:#ffffff; --line:#e5e9f2; --ink:#0f1e3d; --muted:#6b7896;
  --ok:#16a34a; --okbg:#dcfce7; --warn:#d97706; --warnbg:#fef3c7; --bad:#dc2626; --badbg:#fee2e2;
  --grad:linear-gradient(135deg,#0f1e3d 0%,#1b3a6b 55%,#2563eb 100%);
  --grad-hero:linear-gradient(100deg,#13233f 0%,#213f63 26%,#31608f 52%,#4a86bd 78%,#68a6d8 100%);
  --cyan:#2dd4bf;
  --shadow:0 1px 2px rgba(15,30,61,.05), 0 6px 18px rgba(15,30,61,.06);
  --shadow-hero:0 14px 34px rgba(37,99,235,.30);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:radial-gradient(1100px 460px at 100% -8%, rgba(96,165,250,.18), transparent 60%), radial-gradient(820px 400px at -6% 2%, rgba(37,99,235,.10), transparent 55%), var(--bg);background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none}
.page-fx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.pspot{position:absolute;border-radius:50%;filter:blur(8px);background:radial-gradient(circle at 50% 50%, rgba(59,130,246,.16), rgba(59,130,246,0) 70%);animation-name:pageDrift;animation-timing-function:ease-in-out;animation-iteration-count:infinite;will-change:transform}
.pspot.t{background:radial-gradient(circle at 50% 50%, rgba(45,212,191,.13), rgba(45,212,191,0) 70%)}
@keyframes pageDrift{0%{transform:translate(0,0)}50%{transform:translate(42px,-32px)}100%{transform:translate(0,0)}}
@keyframes pageDrift2{0%{transform:translate(0,0)}50%{transform:translate(-38px,30px)}100%{transform:translate(0,0)}}
@media (prefers-reduced-motion: reduce){.pspot{animation:none}}
input,select{font-family:inherit;font-size:14px}

/* Layout */
.app{display:flex;min-height:100vh}
.side{width:250px;background:var(--grad);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:60;transform:translateX(-100%);transition:transform .22s ease}
.side.open{transform:translateX(0);box-shadow:0 0 44px rgba(0,0,0,.35)}
.side-backdrop{position:fixed;inset:0;background:rgba(8,15,30,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.side-backdrop.show{opacity:1;pointer-events:auto}
.apptop{position:sticky;top:0;z-index:30;height:56px;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--card);border-bottom:1px solid var(--line)}
.hamburger{width:40px;height:40px;border-radius:9px;background:transparent;display:grid;place-items:center;font-size:23px;color:var(--navy)}
.hamburger:hover{background:#eef1f7}
.apptop-brand{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--navy);font-size:15px}
.apptop-brand .tlogo{width:30px;height:30px;border-radius:8px;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:17px}
.apptop-brand span{font-weight:400;font-size:11.5px;color:var(--muted)}
@media(max-width:560px){.apptop-brand span{display:none}}
.drawer-close{background:rgba(255,255,255,.12);color:#fff;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px}
.drawer-close:hover{background:rgba(255,255,255,.22)}
/* collapsible HR sections */
.card.collapsible{padding:0;overflow:hidden}
.sec-head{width:100%;display:flex;align-items:center;gap:12px;padding:16px 20px;background:none;text-align:left}
.sec-head:hover{background:#f7f9fc}
.sec-icon{color:var(--accent);font-size:19px}
.sec-title{font-size:15px;font-weight:600;color:#111827}
.sec-sum{margin-left:auto;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sec-chev{color:var(--muted);font-size:18px;transition:transform .2s}
.card.collapsible.open .sec-chev{transform:rotate(180deg)}
.sec-body{padding:2px 20px 20px}
/* add-entry toggle */
.entrytoggle{display:flex;gap:6px;background:#eef1f7;padding:4px;border-radius:10px}
.entrytoggle .et{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;background:none}
.entrytoggle .et.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.brand{padding:20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .logo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:20px}
.brand b{font-size:15px;letter-spacing:.3px}
.brand span{display:block;font-size:11px;opacity:.7;font-weight:400}
.nav{padding:10px;flex:1;overflow-y:auto}
.navlbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.5;padding:14px 12px 6px}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,.82);font-size:13.5px;font-weight:500;width:100%;text-align:left;background:none;transition:.15s}
.navitem:hover{background:rgba(255,255,255,.09);color:#fff}
.navitem.active{background:rgba(255,255,255,.16);color:#fff}
.navitem i{font-size:18px}
.whoami{padding:12px;border-top:1px solid rgba(255,255,255,.12)}
.whoami label{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.6}
.whoami select{width:100%;margin-top:6px;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff}
.whoami select option{color:#111}

.main{margin-left:0;flex:1;padding:22px 26px;max-width:100%}
.pagehead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.pagehead h1{font-size:22px;font-weight:700}
.pagehead p{color:var(--muted);font-size:13px;margin-top:3px}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 i{color:var(--accent);font-size:19px}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.ok{background:var(--okbg);color:var(--ok)} .pill.warn{background:var(--warnbg);color:var(--warn)}
.pill.bad{background:var(--badbg);color:var(--bad)} .pill.neutral{background:#eef1f7;color:var(--muted)}

/* Buttons */
.btn{padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn.primary{background:var(--grad);color:#fff} .btn.primary:hover{opacity:.92}
.btn.ghost{background:#eef1f7;color:var(--navy)} .btn.ghost:hover{background:#e2e7f2}
.btn.sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Clock */
.clockwrap{display:grid;grid-template-columns:1fr 340px;gap:18px}
@media(max-width:900px){.clockwrap{grid-template-columns:1fr}}
.clockface{background:var(--grad);color:#fff;border-radius:16px;padding:28px;text-align:center}
.clockface .time{font-size:46px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums}
.clockface .date{opacity:.8;margin-top:2px;font-size:13px}
.clockface .status{margin-top:16px;display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.15);font-size:13px;font-weight:600}
.punchgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
.punchbtn{padding:16px;border-radius:12px;font-weight:600;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:7px;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}
.punchbtn i{font-size:26px}
.punchbtn:hover:not(:disabled){background:rgba(255,255,255,.22)}
.punchbtn:disabled{opacity:.35;cursor:not-allowed}
.punchbtn.go{background:#16a34a;border-color:#16a34a} .punchbtn.stop{background:#dc2626;border-color:#dc2626}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--line);font-weight:600}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.num{font-variant-numeric:tabular-nums;text-align:right}
.punchlog{font-size:12.5px}
.punchlog td{padding:7px 10px}
.src{font-size:10px;padding:1px 6px;border-radius:5px;background:#eef1f7;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.src.bio{background:#eef2ff;color:#4338ca}

/* Approval bar */
.approvals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
@media(max-width:700px){.approvals{grid-template-columns:1fr}}
.appbox{border:1.5px solid var(--line);border-radius:12px;padding:14px}
.appbox.done{border-color:var(--ok);background:var(--okbg)}
.appbox.locked{opacity:.55}
.appbox .role{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
.appbox .chk{display:flex;align-items:center;gap:9px;margin-top:9px}
.appbox .chk input{width:19px;height:19px;accent-color:var(--ok)}
.appbox .chk label{font-weight:600;font-size:13.5px}
.appbox .stamp{font-size:11.5px;color:var(--muted);margin-top:7px}

/* Forms */
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.formgrid{grid-template-columns:1fr}}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}

.roster td .who{font-weight:600}
.roster td .sub{font-size:11.5px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef1f7;color:var(--navy);font-weight:500}
.hint{font-size:12px;color:var(--muted);margin-top:4px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.exc{font-size:11px;color:var(--bad);display:block}
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:.25s;z-index:50}
.gate{position:fixed;inset:0;z-index:200;background:radial-gradient(circle at 50% -10%, #24509c 0%, #12275180 40%, #0a1428 100%),#0a1428;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:34px 30px;width:100%;max-width:360px;backdrop-filter:blur(12px);color:#fff;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35)}
.gate-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:grid;place-items:center;font-size:29px;margin:0 auto 16px;box-shadow:0 12px 30px rgba(37,99,235,.4)}
.gate-card h1{font-size:21px;font-weight:800}
.gate-card p{opacity:.6;font-size:12.5px;margin:4px 0 22px}
.gate-card input{width:100%;padding:13px 14px;margin-bottom:11px;border-radius:11px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:15px}
.gate-card input::placeholder{color:rgba(255,255,255,.4)}
.gate-err{min-height:18px;font-size:12.5px;color:#fca5a5;margin-bottom:8px}
.gate-btn{width:100%;padding:14px;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(15,30,61,.5);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal.show{display:flex}
.modalcard{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.modalhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modalhead b{font-size:15px}
.modalbody{padding:18px 20px;overflow-y:auto}
.modalbody input[type=date],.modalbody input[type=time],.modalbody select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fbfcfe;width:100%}
.modalfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.notewarn{margin-top:14px;padding:11px 13px;background:var(--warnbg);color:#92600a;border-radius:9px;font-size:12.5px;display:flex;gap:8px;align-items:flex-start}
.notewarn i{font-size:16px;margin-top:1px}

/* History */
.histpanel{background:#fbfcfe;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:14px}
.histhead{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;align-items:center;gap:7px;margin-bottom:10px}
.histrow{display:flex;gap:11px;padding:7px 0;border-top:1px solid var(--line)}
.histrow:first-of-type{border-top:none}
.histrow i{font-size:16px;color:var(--accent);margin-top:2px}
.histmain{font-size:13px;font-weight:500}
.histmeta{font-size:11.5px;color:var(--muted);margin-top:2px}

/* Nav badge */
.navbadge{margin-left:auto;background:#f43f5e;color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;border-radius:10px;display:inline-grid;place-items:center;padding:0 5px}
.navitem{position:relative}

/* Dashboard hero */
.hero{background:var(--grad-hero);border-radius:18px;padding:28px 30px;color:#fff;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;overflow:hidden;position:relative;box-shadow:var(--shadow-hero)}
.hero::before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;background:linear-gradient(102deg, rgba(255,255,255,0) 30%, rgba(255,255,255,.10) 49%, rgba(255,255,255,0) 64%), radial-gradient(620px 240px at 90% -30%, rgba(255,255,255,.16), transparent 62%)}
.hero-spot{position:absolute;z-index:0;border-radius:50%;pointer-events:none;background:radial-gradient(circle at 50% 50%, rgba(222,238,255,.55), rgba(222,238,255,0) 70%);filter:blur(3px);animation-name:heroDrift;animation-timing-function:ease-in-out;animation-iteration-count:infinite;will-change:transform,opacity}
@keyframes heroDrift{0%{transform:translate(0,0) scale(1);opacity:.38}50%{transform:translate(16px,-12px) scale(1.16);opacity:.8}100%{transform:translate(0,0) scale(1);opacity:.38}}
@keyframes heroDrift2{0%{transform:translate(0,0) scale(1);opacity:.28}50%{transform:translate(-15px,11px) scale(1.1);opacity:.62}100%{transform:translate(0,0) scale(1);opacity:.28}}
@media (prefers-reduced-motion: reduce){.hero-spot{animation:none}}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.5px;font-weight:700;color:var(--cyan);text-transform:uppercase;margin-bottom:9px}
.hero-eyebrow .livedot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(45,212,191,.55);animation:livepulse 2.2s infinite}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.5)}70%{box-shadow:0 0 0 8px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
.hero-name{color:var(--cyan)}
.hero-txt{position:relative;z-index:1}
.hero-txt h2{font-size:30px;font-weight:800;margin-bottom:5px;letter-spacing:-.4px;text-shadow:0 2px 14px rgba(8,20,50,.28)}
.hero-txt p{opacity:.9;font-size:14.5px}
.hero-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.hero-cta{background:#fff;color:var(--accent);font-weight:700;box-shadow:0 6px 16px rgba(8,20,50,.18);transition:transform .16s ease, box-shadow .16s ease}
.hero-cta:hover{transform:translateY(-1px);box-shadow:0 9px 20px rgba(8,20,50,.24)}
.hero-cta.ghost{background:rgba(255,255,255,.16);color:#fff;box-shadow:none}
.hero-cta.ghost:hover{background:rgba(255,255,255,.26)}
.hero-badge{font-size:96px;opacity:.16;position:absolute;right:22px;top:50%;transform:translateY(-50%);z-index:0}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi-ic{width:34px;height:34px;border-radius:9px;background:#eef2ff;color:var(--accent);display:grid;place-items:center;font-size:19px;margin-bottom:10px}
.kpi.ok .kpi-ic{background:var(--okbg);color:var(--ok)} .kpi.warn .kpi-ic{background:var(--warnbg);color:var(--warn)}
.kpi.bad .kpi-ic{background:var(--badbg);color:var(--bad)} .kpi.neutral .kpi-ic{background:#eef1f7;color:var(--muted)}
.kpi-val{font-size:24px;font-weight:700;line-height:1.1}
.kpi-lbl{font-size:12.5px;color:var(--muted);margin-top:2px;font-weight:500}
.kpi-sub{font-size:11.5px;color:var(--muted);margin-top:5px}

/* Dashboard grid + lists */
.dashgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.dashgrid{grid-template-columns:1fr}}
.cbadge{background:#f43f5e;color:#fff;font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px;margin-left:6px}
.listrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.listrow:first-of-type{border-top:none}
.card h2+.listrow{border-top:none}
.listrow[onclick]{cursor:pointer} .listrow[onclick]:hover{background:#fafbff;margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:8px}
.listrow b{font-size:13.5px} .listsub{font-size:11.5px;color:var(--muted);margin-top:2px}
.listrow .ti-chevron-right{color:var(--muted)}

/* Correction request banner (on timecards) */
.reqbanner{border-radius:11px;padding:6px 14px;margin-bottom:12px}
.reqbanner.act{background:#fff7ed;border:1px solid #fed7aa}
.reqbanner.info{background:#eef2ff;border:1px solid #c7d2fe}
.reqrow{display:flex;align-items:center;gap:11px;padding:8px 0;border-top:1px solid rgba(0,0,0,.06)}
.reqrow:first-child{border-top:none}
.reqrow>i{font-size:19px;color:var(--warn)}
.reqbanner.info .reqrow>i{color:var(--accent)}
.reqrow>div:nth-child(2){flex:1}
.reqrow b{font-size:13px} .reqmeta{font-size:11.5px;color:var(--muted);margin-top:2px}

/* Progressive-discipline ladder (Occurrences tab reference chart) */
.displadder{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:var(--card)}
.displadder-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.displadder-eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
.displadder-action{font-size:16px;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:7px}
.displadder-action.ok{color:var(--ok)} .displadder-action.warn{color:var(--warn)} .displadder-action.bad{color:var(--bad)}
.ladder{display:flex;gap:6px}
.lstep{flex:1;border:1.5px solid var(--line);border-radius:9px;padding:9px 8px;background:#fbfcfe;opacity:.55;transition:.15s;min-width:0;position:relative}
.lstep.on{opacity:1;box-shadow:0 3px 10px rgba(15,30,61,.09)}
.lstep.on.ok{border-color:var(--ok);background:var(--okbg)}
.lstep.on.warn{border-color:var(--warn);background:var(--warnbg)}
.lstep.on.bad{border-color:var(--bad);background:var(--badbg)}
.lstep-band{font-size:12px;font-weight:700}

/* ============================================================
   LIVE — Supabase realtime. On any change to a watched table
   (from the web clock, another manager, or this app), re-pull the
   snapshot via loadAll() and re-render. Reload-on-change reuses the
   exact hydration path afterAuth() uses, so nested shapes stay
   correct. Debounced so a burst collapses into one refresh; deferred
   while a field is focused so it never yanks the cursor mid-edit;
   re-syncs on (re)subscribe and tab re-focus to catch missed events.
============================================================ */
const Live = (() => {
  const TABLES = ['punches','seg_approvals','seg_notes','punch_requests','pto_requests',
    'leave_entries','occurrences','premiums','holidays','schedules','recurring_schedules',
    'excused_exceptions','ack_alerts','employees','payroll_batches','report_configs'];
  let ch=null, bus=null, timer=null, pending=false, running=false;
  const fieldFocused = () => { const el=document.activeElement; return !!el && /^(INPUT|SELECT|TEXTAREA)$/.test(el.tagName); };
  function ping(){ if(bus){ try{ bus.send({type:'broadcast', event:'changed', payload:{}}); }catch(e){} } }
  async function sync(){
    if(!AUTHED || !CURRENT) return;
    const snap = await Store.loadAll();
    if(snap){ Object.keys(snap).forEach(k=>{ DB[k]=snap[k]; }); }
    rebuildManages(); recomputeAllApprovals(); render();
  }
  async function run(){
    if(!pending || running) return;
    if(fieldFocused()){ schedule(600); return; }   // someone's typing — wait
    pending=false; running=true;
    try{ await sync(); }catch(e){ console.error('live sync failed', e); }
    finally{ running=false; if(pending) schedule(200); }
  }
  function schedule(ms){ pending=true; clearTimeout(timer); timer=setTimeout(run, ms||350); }
  return {
    async start(){
      if(!Store.enabled || ch) return;
      const sb=Store.client();
      // Feed the signed-in user's JWT to the realtime socket. Without it the
      // socket connects as anon and RLS silently drops every row event. Re-feed
      // on every auth change so the stream survives token refresh.
      async function pushAuth(){
        try{ const { data:{ session } }=await sb.auth.getSession();
          if(session && sb.realtime && sb.realtime.setAuth){ await sb.realtime.setAuth(session.access_token); return true; } }
        catch(e){ console.warn('[live] setAuth failed', e); }
        return false;
      }
      await pushAuth();
      sb.auth.onAuthStateChange((_e, s)=>{ if(s && sb.realtime && sb.realtime.setAuth) sb.realtime.setAuth(s.access_token); });
      ch = Store.subscribe(TABLES,
        p=>{ schedule(); },
        status=>{ if(status==='SUBSCRIBED') schedule(); });
      // Broadcast bus — RLS-proof cross-app signal. Any write in either app
      // pings this shared channel; the other app re-syncs through its own
      // authenticated query, so no data rides on the wire.
      bus = sb.channel('hr-sync', { config:{ broadcast:{ self:false } } });
      bus.on('broadcast', { event:'changed' }, ()=>schedule());
      bus.subscribe();
      window.__hrPing = ping;
      document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) schedule(); });
    },
    stop(){ if(ch){ Store.removeChannel(ch); ch=null; } if(bus){ Store.removeChannel(bus); bus=null; } window.__hrPing=null; clearTimeout(timer); pending=false; }
  };
})();

/* ============================================================
   TIME HELPERS  (punches stored UTC, shown in employee tz)
============================================================ */
function partsInTz(iso, tz){
  const f = new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false,weekday:'short'});
  const p = {}; f.formatToParts(new Date(iso)).forEach(x=>p[x.type]=x.value);
  return {ymd:`${p.year}-${p.month}-${p.day}`, hh:+p.hour, mm:+p.minute, wd:p.weekday};
}
function fmtTime(iso, e){
  return new Intl.DateTimeFormat('en-US',{timeZone:e.tz,hour:'numeric',minute:'2-digit',hour12:true}).format(new Date(iso));
}
// convert a raw "HH:MM" (24h) string to 12-hour display, e.g. "16:45" -> "4:45 PM"
function fmt12(hm){ if(!hm||!hm.includes(':')) return hm; let [h,m]=hm.split(':').map(Number); const ap=h<12?'AM':'PM'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; }
function weekKeyFor(iso, e){ // Monday-start week id in employee tz
  const p = partsInTz(iso,e.tz);
  const local = new Date(p.ymd+'T00:00:00Z');
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(p.wd);
  const back = (dow+6)%7;                    // days back to Monday
  const mon = new Date(local.getTime() - back*86400000);
  return mon.toISOString().slice(0,10);
}
function currentWeekKey(e){ return weekKeyFor(new Date().toISOString(), e); }
function weekLabel(key){
  const s = new Date(key+'T00:00:00Z'); const e = new Date(s.getTime()+6*86400000);
  const f = d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'});
  return `${f(s)} – ${f(e)}`;
}
// Biweekly pay period, Monday–Sunday, anchored to a known period-start Monday.
function payPeriodStart(ymd){
  const anchor=CFG.payAnchor;
  const ms = Date.parse(ymd+'T00:00:00Z') - Date.parse(anchor+'T00:00:00Z');
  const n = Math.floor(ms/(14*86400000));
  return new Date(Date.parse(anchor+'T00:00:00Z') + n*14*86400000).toISOString().slice(0,10);
}

// HH:MM (24h) of a punch in employee tz — for <input type="time">
function hhmm(iso, e){ const p=partsInTz(iso,e.tz); return `${String(p.hh).padStart(2,'0')}:${String(p.mm).padStart(2,'0')}`; }
// minutes a tz is ahead of UTC at a given instant
function offsetMin(date, tz){
  const dtf=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const p={}; dtf.formatToParts(date).forEach(x=>p[x.type]=x.value);
  const asUTC=Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second);
  return (asUTC-date.getTime())/60000;
}
// employee-local wall time (ymd + "HH:MM") -> UTC ISO
function wallToUtc(ymd, hm, tz){
  const [Y,M,D]=ymd.split('-').map(Number); const [h,m]=hm.split(':').map(Number);
  const guess=new Date(Date.UTC(Y,M-1,D,h,m,0));
  let off=offsetMin(guess,tz);
  let utc=new Date(guess.getTime()-off*60000);
  const off2=offsetMin(utc,tz); if(off2!==off) utc=new Date(guess.getTime()-off2*60000); // DST edge
  return utc.toISOString();
}
function audit(action, empId, weekKey, punchId, before, after, by, reason){
  DB.audit.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,5), action, emp:empId, weekKey, punchId, before, after, by, reason, at:new Date().toISOString()});
  Store.audit({action, emp:empId, weekKey, punchId, before, after, by, reason});
}

/* ============================================================
   TIMECARD ENGINE — pair punches, totals, OT, exceptions
============================================================ */
function dedupPunches(list){
  // same emp + type within CFG.dedupMin minutes: keep the latest-recorded (latest ts) — "latest source wins"
  const out=[]; const win=CFG.dedupMin*60000;
  const sorted=[...list].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  sorted.forEach(p=>{
    const dup=out.find(q=>q.type===p.type && Math.abs(new Date(q.ts)-new Date(p.ts))<win);
    if(dup){ if(new Date(p.ts)>=new Date(dup.ts)){ dup.ts=p.ts; dup.source=p.source; dup.editedBy=p.editedBy; } }
    else out.push({...p});
  });
  return out.sort((a,b)=>new Date(a.ts)-new Date(b.ts));
}
/* Punch index: buckets every punch by employee+week ONCE, so buildTimecard/period
   math is O(1) lookups instead of re-scanning the whole punch table per employee.
   Auto-rebuilds only when DB.punches changes (all mutations swap the ref or length). */
let _pIdx=null, _pIdxRef=null, _pIdxLen=-1;
function punchIndex(){
  if(_pIdx && _pIdxRef===DB.punches && _pIdxLen===DB.punches.length) return _pIdx;
  const byWeek=new Map(), byEmp=new Map();
  for(const p of DB.punches){
    const e=emp(p.emp); if(!e) continue;
    let we=byEmp.get(p.emp); if(!we){ we=[]; byEmp.set(p.emp,we); } we.push(p);
    const wk=weekKeyFor(p.ts,e);
    let m=byWeek.get(p.emp); if(!m){ m=new Map(); byWeek.set(p.emp,m); }
    let a=m.get(wk); if(!a){ a=[]; m.set(wk,a); } a.push(p);
  }
  _pIdx={byWeek,byEmp}; _pIdxRef=DB.punches; _pIdxLen=DB.punches.length;
  return _pIdx;
}
function punchesForWeek(empId,weekKey){ return punchIndex().byWeek.get(empId)?.get(weekKey) || []; }
function punchesForEmp(empId){ return punchIndex().byEmp.get(empId) || []; }

function buildTimecard(empId, weekKey){
  const e = emp(empId); const rule = ruleFor(e);
  const wp = dedupPunches(punchesForWeek(empId, weekKey));
  const byDay = {};
  wp.forEach(p=>{ const k=partsInTz(p.ts,e.tz).ymd; (byDay[k]=byDay[k]||[]).push(p); });

  const days = Object.keys(byDay).sort().map(ymd=>{
    const ps = byDay[ymd]; let worked=0, mealMin=0, exceptions=[]; let mealViol=false;
    let inT=null, mealT=null, breakT=null;
    ps.forEach(p=>{
      const t = new Date(p.ts).getTime();
      if(p.type==='in') inT=t;
      else if(p.type==='out'){ if(inT){worked+=t-inT; inT=null;} else exceptions.push('Out with no In'); }
      else if(p.type==='meal_start'){ mealT=t; if(inT){worked+=t-inT; inT=null;} }
      else if(p.type==='meal_end'){ if(mealT){mealMin+=(t-mealT)/60000; inT=t; mealT=null;} }
      else if(p.type==='break_start'){ breakT=t; if(inT){worked+=t-inT; inT=null;} }
      else if(p.type==='break_end'){ if(breakT){ const dur=(t-breakT)/60000; worked+=Math.min(dur,12)*60000; inT=t; breakT=null; } } // paid up to 12 min, excess unpaid
    });
    if(inT) exceptions.push('Missing out punch');
    const hrs = worked/3600000;
    // meal-law flags (state-driven, e.g. CA: 30-min meal before end of 5th hour) -> premium owed
    if(rule.mealLaw){
      if(hrs>5 && mealMin===0){ exceptions.push('No meal past 5th hour · premium'); mealViol=true; }
      else if(mealMin>0 && mealMin<30){ exceptions.push(`Short meal ${Math.round(mealMin)}m · premium`); mealViol=true; }
    }
    return {ymd, punches:ps, hrs, mealMin, exceptions, mealViol};
  });

  // OT allocation
  let reg=0, ot=0, dt=0;
  if(rule.daily){
    const worked = days.filter(d=>d.hrs>0);
    const seventh = worked.length>=7 ? worked[worked.length-1].ymd : null; // all 7 days worked = 7th consecutive
    days.forEach(d=>{
      const h=d.hrs;
      if(d.ymd===seventh){ if(h>8){ ot+=8; dt+=h-8; } else { ot+=h; } return; } // 7th day: 1.5x first 8, 2x beyond
      if(h>rule.dt){ dt+=h-rule.dt; ot+=rule.dt-rule.ot; reg+=rule.ot; }
      else if(h>rule.ot){ ot+=h-rule.ot; reg+=rule.ot; }
      else reg+=h;
    });
    if(reg>rule.weekly){ ot+=reg-rule.weekly; reg=rule.weekly; }
  } else {
    const total = days.reduce((s,d)=>s+d.hrs,0);
    reg = Math.min(total, rule.weekly); ot = Math.max(0, total-rule.weekly);
  }
  const total = days.reduce((s,d)=>s+d.hrs,0);
  const anyExc = days.some(d=>d.exceptions.length);
  return {e, weekKey, days, reg, ot, dt, total, anyExc};
}

function saveEdit(){
  const {empId, weekKey, rows, removed, reason}=EDIT; const e=emp(empId);
  if(!reason.trim()){ toast('Add a reason for the change'); return; }
  const by=me().name; let changed=false;
  removed.forEach(r=>{ if(r.id){ DB.punches=DB.punches.filter(p=>p.id!==r.id);
    audit('delete',empId,weekKey,r.id,{time:r.time,type:r.type},null,by,reason); changed=true; } });
  rows.forEach(r=>{
    const iso=wallToUtc(r.ymd,r.time,e.tz);
    if(!r.id){
      const np={id:'p'+Date.now()+Math.random().toString(36).slice(2,5), emp:empId, ts:iso, type:r.type, source:'manual', editedBy:by};
      DB.punches.push(np); audit('add',empId,weekKey,np.id,null,{time:r.time,type:r.type},by,reason); changed=true;
    } else {
      const p=DB.punches.find(x=>x.id===r.id);
      const bTime=hhmm(p.ts,e), bType=p.type, bYmd=partsInTz(p.ts,e.tz).ymd;
      if(bTime!==r.time||bType!==r.type||bYmd!==r.ymd){
        p.ts=iso; p.type=r.type; p.source='manual'; p.editedBy=by;
        audit('edit',empId,weekKey,p.id,{time:bTime,type:bType},{time:r.time,type:r.type},by,reason); changed=true;
      }
    }
  });
  if(changed){
    const a=getApproval(empId,weekKey);
    if(a.employee||a.manager||a.hr){
      DB.approvals[approvalKey(empId,weekKey)]={employee:null,manager:null,hr:null,locked:false};
      audit('reset',empId,weekKey,null,null,null,by,'Approvals reset after edit');

}

function reqSet(f,v){
  REQ[f]=v;
  if(f==='kind' && v==='fix' && REQ.targetId){ const p=DB.punches.find(x=>x.id===REQ.targetId); if(p){const e=emp(REQ.empId); REQ.ymd=partsInTz(p.ts,e.tz).ymd; REQ.time=hhmm(p.ts,e); REQ.type=p.type;} }
  if(f==='targetId'){ const p=DB.punches.find(x=>x.id===v); if(p){const e=emp(REQ.empId); REQ.ymd=partsInTz(p.ts,e.tz).ymd; REQ.time=hhmm(p.ts,e); REQ.type=p.type;} }

function submitRequest(){
  if(!REQ.note.trim()){ toast('Add a note explaining the correction'); return; }
  const r={
    id:'r'+Date.now()+Math.random().toString(36).slice(2,5),
    emp:REQ.empId, weekKey:REQ.weekKey, kind:REQ.kind,
    targetId:REQ.kind==='fix'?REQ.targetId:null,
    proposed:{ymd:REQ.ymd, time:REQ.time, type:REQ.type},
    note:REQ.note, status:'pending', by:me().name, at:new Date().toISOString(),
    resolvedBy:null, resolvedAt:null, resolveNote:null
  };
  DB.requests.push(r); chk(Store.addPunchRequest(r),'Request');
  REQ=null; toast('Correction request sent to your manager & HR'); render();
}
function applyRequest(reqId){
  const r=DB.requests.find(x=>x.id===reqId); if(!r) return; const e=emp(r.emp);
  const iso=wallToUtc(r.proposed.ymd, r.proposed.time, e.tz);
  const reason=`Employee request: ${r.note}`;
  if(r.kind==='add'){
    const np={id:'p'+Date.now()+Math.random().toString(36).slice(2,5), emp:r.emp, ts:iso, type:r.proposed.type, source:'manual', editedBy:me().name};
    DB.punches.push(np); chk(Store.addPunch(np),'Apply'); audit('add', r.emp, r.weekKey, np.id, null, {time:r.proposed.time,type:r.proposed.type}, me().name, reason);
  } else {
    const p=DB.punches.find(x=>x.id===r.targetId);
    if(p){ const b={time:hhmm(p.ts,e),type:p.type}; p.ts=iso; p.type=r.proposed.type; p.source='manual'; p.editedBy=me().name; chk(Store.editPunch(p),'Apply');
      audit('edit', r.emp, r.weekKey, p.id, b, {time:r.proposed.time,type:r.proposed.type}, me().name, reason); }
  }
  const a=getApproval(r.emp,r.weekKey);
  if(a.employee||a.manager||a.hr){ resetWeekApprovals(r.emp,r.weekKey);
    audit('reset', r.emp, r.weekKey, null,null,null, me().name, 'Approvals reset after applying request'); }
  r.status='applied'; r.resolvedBy=me().name; r.resolvedAt=new Date().toISOString();
  chk(Store.decidePunchRequest(r.id,'applied',me().name),'Apply'); toast('Correction applied'); render();
}
function declineRequest(reqId){
  const r=DB.requests.find(x=>x.id===reqId); if(!r) return;
  r.status='declined'; r.resolvedBy=me().name; r.resolvedAt=new Date().toISOString();
  chk(Store.decidePunchRequest(r.id,'declined',me().name),'Decline'); toast('Request declined'); render();
}

function scopeEmployees(){

/* ---------- NOTIFICATIONS / ALERTS ---------- */
// cutoff = the Tuesday after the current pay period ends (11am)
function periodCutoff(){ const t=todayYmd(me()); const pp=payPeriodStart(t); return ymdAdd(ymdAdd(pp,13),2); }
// per-employee alerts across the current pay period; also period-level (unapproved before cutoff)
function alertsFor(u){
  const scope = u.role==='hr' ? DB.employees.filter(e=>e.role==='employee' || !!e.hireDate)
              : DB.employees.filter(e=>u.manages?.includes(e.id));
  const t=todayYmd(me()); const start=payPeriodStart(t), stop=ymdAdd(start,13);
  const cutoff=periodCutoff(); const daysToCutoff=Math.round((Date.parse(cutoff)-Date.parse(t))/86400000);
  const out=[];
  scope.forEach(e=>{
    // missing punches + meal premiums (per day, this period)
    let cur=start;
    while(cur<=stop && cur<=t){
      const wk=weekKeyFor(cur+'T12:00:00Z',e); const tc=buildTimecard(e.id,wk); const d=tc.days.find(x=>x.ymd===cur);
      if(d){
        d.exceptions.forEach(x=>{
          if((x.includes('Missing')||x.includes('no In')) && !isExcused(e.id,cur,x))
            out.push({emp:e.id, to:'employee', type:'punch', date:cur, msg:`Missing punch on ${md(cur)} — needs correction`});
        });
        if(d.mealViol){ const flag=d.exceptions.find(x=>x.includes('premium'));
          if(flag && !isExcused(e.id,cur,flag)) out.push({emp:e.id, to:'employee', type:'premium', date:cur, msg:`Meal premium earned on ${md(cur)} (1 hr)`}); }
      }
      cur=ymdAdd(cur,1);
    }
    // attendance occurrences this period
    periodOccurrences(e.id,start,stop).forEach(o=>{ if(!o.excused) out.push({emp:e.id, to:'employee', type:'occurrence', date:o.date, msg:`Attendance: ${OCC_TYPES[o.code].label} on ${md(o.date)} (+${o.points} pt)`}); });
    // tier crossing
    const pts=rollingPoints(e.id); const tier=disciplineTier(pts);
    if(pts>=6) out.push({emp:e.id, to:'manager', type:'tier', date:t, msg:`${e.name} at ${pts} pts — ${tier.label}`});
    // unapproved before cutoff
    if(daysToCutoff<=3 && daysToCutoff>=0){
      let w=start, need=false; while(w<=stop){ const a=getApproval(e.id,w); if(!(a.manager && a.hr)) need=true; w=ymdAdd(w,7); }
      if(need) out.push({emp:e.id, to:'manager', type:'approval', date:cutoff, msg:`${e.name}'s timecard not fully approved — cutoff ${md(cutoff)} 11am`});
    }
  });
  return out.map(a=>({...a, key:`${a.emp}|${a.type}|${a.date}`})).filter(a=>!DB.ackAlerts[a.key]);
}
function md(ymd){ return ymdD(ymd).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'}); }
function ackAlert(key){ DB.ackAlerts[key]={by:me().name, at:new Date().toISOString()}; const a=alertsFor(me()).find(x=>x.key===key); chk(Store.ackAlert(a?a.emp:me().id, key, me().name),'Acknowledge'); render(); }

function donut(segs,center){
  const sum=segs.reduce((s,x)=>s+x.val,0)||1; let acc=0;
  const stops=segs.map(s=>{const a=acc/sum*100;acc+=s.val;const b=acc/sum*100;return `${s.color} ${a}% ${b}%`;}).join(',');
  return `<div class="donutwrap"><div class="donut" style="background:conic-gradient(${stops})"><div class="donuthole">${center}</div></div>
    <div class="donutleg">${segs.map(s=>`<div class="legrow"><span class="legdot" style="background:${s.color}"></span>${s.label} · <b>${h2(s.val)}</b> · ${Math.round(s.val/sum*100)}%</div>`).join('')||'<div class="empty">No hours yet.</div>'}</div></div>`;
}

/* ---------- PUNCH STATUS (fed by biometric clock + external web clock) ---------- */
function empStatus(empId){
  const e = emp(empId);
  const last = DB.punches.filter(p=>p.emp===empId).sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  if(!last) return 'out';
  if(last.type==='in'||last.type==='meal_end'||last.type==='break_end') return 'in';
  if(last.type==='meal_start') return 'meal';
  if(last.type==='break_start') return 'break';
  return 'out';
}
function labelType(t){return {in:'Clock In',out:'Clock Out',meal_start:'Meal start',meal_end:'Meal end',break_start:'Break start',break_end:'Break end'}[t]||t;}

/* ---------- TIMECARD (shared renderer) ---------- */
function h2(n){ let h=Math.floor(n); let m=Math.round((n-h)*60); if(m>=60){ h+=1; m-=60; } return `${h}:${String(m).padStart(2,'0')}`; }
/* ---- segment engine + per-row E/M/O approval + segment notes ---- */
const LAYER_BY={E:'employee',M:'manager',O:'hr'};
function daySegments(punches){
  const segs=[]; let seg=null; let pend=null;
  [...punches].sort((a,b)=>new Date(a.ts)-new Date(b.ts)).forEach(p=>{
    const t=new Date(p.ts).getTime();
    if(p.type==='in'||p.type==='meal_end'||p.type==='break_end'){
      // a new start while a segment is still open = the prior one was never closed
      if(seg){ seg.issue='Missing out punch'; segs.push(seg); seg=null; }
      if(pend && segs.length){ const prev=segs[segs.length-1]; prev.breakMin=(t-pend.t)/60000; prev.breakPaid=pend.paid; }
      const orphanResume = !pend && (p.type==='meal_end'||p.type==='break_end'); // resume with no matching start
      pend=null; seg={inId:p.id, outId:null, in:p.ts, out:null, hrs:0, breakMin:null, breakPaid:false, manual:p.source==='manual'};
      if(orphanResume) seg.issue=`Unmatched ${labelType(p.type)}`;
    } else if(p.type==='out'||p.type==='meal_start'||p.type==='break_start'){
      if(seg){ seg.out=p.ts; seg.outId=p.id; seg.hrs=(t-new Date(seg.in).getTime())/3600000; if(p.source==='manual')seg.manual=true; segs.push(seg); seg=null; }
      else { segs.push({inId:p.id, outId:p.id, in:p.ts, out:p.ts, hrs:0, breakMin:null, breakPaid:false, manual:p.source==='manual', issue:`Unmatched ${labelType(p.type)}`}); }
      pend = p.type==='meal_start' ? {t,paid:false} : p.type==='break_start' ? {t,paid:true} : null;
    }
  });
  if(seg){ seg.issue=seg.issue||'Missing out punch'; segs.push(seg); }
  return segs;
}
function segKey(inId,L){return `${inId}|${L}`;}
function segApproved(inId,L){return !!DB.segApprovals[segKey(inId,L)];}
function canToggleLayer(L,empId){ const u=me();
  if(u.role==='hr') return true;
  if(u.role==='manager' && L==='M' && u.manages?.includes(empId)) return true;
  return false;
}
function weekSegIds(empId,weekKey){ const ids=[]; buildTimecard(empId,weekKey).days.forEach(d=>daySegments(d.punches).forEach(s=>ids.push(s.inId))); DB.leave.filter(l=>l.emp===empId && sundayOf(l.date)===weekKey).forEach(l=>ids.push(l.id)); return ids; }

function deleteSegmentDirect(empId, wk, inId, outId){
  if(getApproval(empId,wk).locked){ toast('Period is locked — reopen it to edit'); return; }
  [inId,outId].filter(Boolean).forEach(id=>{ if(DB.punches.some(x=>x.id===id)){ DB.punches=DB.punches.filter(x=>x.id!==id); Store.removePunch(id); } });
  audit('delete',empId,wk,inId,{seg:'line'},null,me().name,'Segment deleted');
  resetWeekApprovals(empId,wk);
  toast('Line removed'); render();
}
function editLeaveById(id){ const l=DB.leave.find(x=>x.id===id); if(l) openLeaveEdit(l); }
function deleteLeaveById(id){
  const l=DB.leave.find(x=>x.id===id); if(!l) return;
  ['E','M','O'].forEach(L=>{ if(DB.segApprovals[segKey(id,L)]){ delete DB.segApprovals[segKey(id,L)]; chk(Store.clearSeg(id,L),'Unapprove'); } });
  DB.leave=DB.leave.filter(x=>x.id!==id); chk(Store.removeLeave(id),'Leave');
  recomputeWeekApproval(l.emp, sundayOf(l.date));
  toast('Line removed'); render();
}
function recomputeWeekApproval(empId,weekKey){
  const ids=weekSegIds(empId,weekKey); const a=getApproval(empId,weekKey); const now=new Date().toISOString();
  ['E','M','O'].forEach(L=>{ const layer=LAYER_BY[L]; const all=ids.length>0 && ids.every(id=>segApproved(id,L));
    if(all && !a[layer]) a[layer]={by:me().name,at:now}; else if(!all && a[layer]) a[layer]=null; });
  a.locked = !!(a.employee&&a.manager&&a.hr);
}
function chk(p,label){ if(p&&p.then) p.then(r=>{
  if(r&&r.error){ console.error(label+' failed:',r.error); toast('⚠ '+label+' not saved — '+(r.error.message||'try again')); }
  else if(r&&Array.isArray(r.data)&&r.data.length===0){ console.warn(label+': update affected 0 rows (blocked by RLS?)'); toast('⚠ '+label+' did not save (permission?)'); }
}); return p; }
function toggleSeg(inId,L,empId,weekKey){
  if(!canToggleLayer(L,empId) || getApproval(empId,weekKey).locked) return;
  const k=segKey(inId,L);
  if(DB.segApprovals[k]){ delete DB.segApprovals[k]; chk(Store.clearSeg(inId,L),'Unapprove'); }
  else { DB.segApprovals[k]={by:me().name,at:new Date().toISOString()}; chk(Store.setSeg(inId,L,empId,me().name),'Approve'); }
  recomputeWeekApproval(empId,weekKey); render();
}
function checkAllSeg(empId,weekKey,L){
  if(!canToggleLayer(L,empId) || getApproval(empId,weekKey).locked) return;
  const ids=weekSegIds(empId,weekKey); const allOn=ids.length>0 && ids.every(id=>segApproved(id,L));
  ids.forEach(id=>{ const k=segKey(id,L);
    if(allOn){ delete DB.segApprovals[k]; chk(Store.clearSeg(id,L),'Unapprove'); }
    else { DB.segApprovals[k]={by:me().name,at:new Date().toISOString()}; chk(Store.setSeg(id,L,empId,me().name),'Approve'); } });
  recomputeWeekApproval(empId,weekKey); render();
}
function approveAllSegs(empId,weekKey){ const now=new Date().toISOString(); weekSegIds(empId,weekKey).forEach(id=>['E','M','O'].forEach(L=>{ DB.segApprovals[segKey(id,L)]={by:me().name,at:now}; Store.setSeg(id,L,empId,me().name); })); }

function puSet(f,v){ PUNCH[f]=v; }
function puKind(k){ PUNCH.kind=k; render(); }
function closePunch(){ PUNCH=null; render(); }
// find the in-punch id of the segment a given punch belongs to (so the note lands on that row)
function segInIdForPunch(empId, ymd, punchId){
  const e=emp(empId);
  const dayP=DB.punches.filter(p=>p.emp===empId && partsInTz(p.ts,e.tz).ymd===ymd);
  const segs=daySegments(dayP);
  const s=segs.find(x=>x.inId===punchId) || segs.find(x=>x.outId===punchId);
  return s?s.inId:punchId;
}

function savePunch(){

/* ---------- Period timecard: one combined table for the whole pay period ---------- */
function periodTimecard(empId, start, stop){
  const e=emp(empId); const days=[]; let reg=0,ot=0,dt=0,total=0; const weekKeys=[];
  let cur=sundayOf(start);
  while(cur<=stop){
    const tc=buildTimecard(empId,cur); reg+=tc.reg; ot+=tc.ot; dt+=tc.dt; total+=tc.total; weekKeys.push(cur);
    tc.days.filter(d=>d.ymd>=start && d.ymd<=stop).forEach(d=>days.push({...d, weekKey:cur, weekTotal:tc.total}));
    cur=ymdAdd(cur,7);
  }
  days.sort((a,b)=>a.ymd.localeCompare(b.ymd));
  const lastByWeek={}; days.forEach((d,i)=>{ lastByWeek[d.weekKey]=i; });
  days.forEach((d,i)=>{ d.isWeekEnd = lastByWeek[d.weekKey]===i; });
  return {e, days, reg, ot, dt, total, weekKeys};
}
function periodSegIds(days, empId, start, stop){ const ids=[]; days.forEach(d=>daySegments(d.punches).forEach(s=>ids.push(s.inId))); if(empId&&start&&stop) DB.leave.filter(l=>l.emp===empId && l.date>=start && l.date<=stop).forEach(l=>ids.push(l.id)); return ids; }
function periodLocked(empId, weekKeys){ return weekKeys.length>0 && weekKeys.every(wk=>getApproval(empId,wk).locked); }
function checkAllSegPeriod(empId,start,stop,L){
  if(!canToggleLayer(L,empId)) return;
  const tc=periodTimecard(empId,start,stop); if(periodLocked(empId,tc.weekKeys)) return;
  const ids=periodSegIds(tc.days, empId, start, stop); const allOn=ids.length>0 && ids.every(id=>segApproved(id,L));
  ids.forEach(id=>{ const k=segKey(id,L);
    if(allOn){ delete DB.segApprovals[k]; chk(Store.clearSeg(id,L),'Unapprove'); }
    else { DB.segApprovals[k]={by:me().name,at:new Date().toISOString()}; chk(Store.setSeg(id,L,empId,me().name),'Approve'); } });
  tc.weekKeys.forEach(wk=>recomputeWeekApproval(empId,wk)); render();
}
function unlockPeriod(empId,start,stop){
  const tc=periodTimecard(empId,start,stop);
  tc.weekKeys.forEach(wk=>{ weekSegIds(empId,wk).forEach(id=>{ delete DB.segApprovals[segKey(id,'O')]; chk(Store.clearSeg(id,'O'),'Unlock'); }); recomputeWeekApproval(empId,wk); });
  toast('Timecard unlocked'); render();
}
function openPeriodEntry(empId,start,stop){
  const tc=periodTimecard(empId,start,stop);
  const wk=tc.weekKeys.find(w=>!getApproval(empId,w).locked)||sundayOf(start);
  openPunch(empId, wk, null, start, stop);
}

function ymdD(y){return new Date(y+'T00:00:00Z');}
function ymdAdd(y,n){return new Date(ymdD(y).getTime()+n*86400000).toISOString().slice(0,10);}
function sundayOf(y){return ymdAdd(y, -((ymdD(y).getUTCDay()+6)%7));} // Monday of the week (period/week start)
function todayYmd(e){return partsInTz(new Date().toISOString(), e.tz).ymd;}

function initHours(){

function filterSortEmps(sort, search){
  let list=DB.employees.filter(e=>e.role==='employee' || !!e.hireDate);
  const q=(search||'').toLowerCase().trim();
  if(q) list=list.filter(e=>e.name.toLowerCase().includes(q)||(e.empId||'').includes(q));
  const last=n=>n.trim().split(/\s+/).slice(-1)[0];
  const cmp={
    dept:(a,b)=>(a.dept||'').localeCompare(b.dept||'')||a.name.localeCompare(b.name),
    last:(a,b)=>last(a.name).localeCompare(last(b.name)),
    first:(a,b)=>a.name.localeCompare(b.name),

    loc:(a,b)=>(a.loc||'').localeCompare(b.loc||'')||a.name.localeCompare(b.name)
  };
  return list.sort(cmp[sort]||cmp.first);
}
function scopeIds(){ return new Set(scopeEmployees().map(e=>e.id)); }
function sortedEmployees(){ const ok=scopeIds(); return filterSortEmps(HOURS?.sort, HOURS?.search).filter(e=>ok.has(e.id)); }

function buildPeriod(empId, start, stop){
  let reg=0,ot=0,dt=0,total=0; const weeks=[];
  let cur=sundayOf(start);
  while(cur<=stop){ const tc=buildTimecard(empId,cur); reg+=tc.reg;ot+=tc.ot;dt+=tc.dt;total+=tc.total; weeks.push(cur); cur=ymdAdd(cur,7); }
  return {reg,ot,dt,total,weeks};
}

/* ---------- ATTENDANCE (occurrences + points), LEAVE, PAYROLL ---------- */
function toMin(hm){ const [h,m]=hm.split(':').map(Number); return h*60+m; }
function scheduleFor(empId, ymd){
  const ov=DB.schedules.filter(s=>s.emp===empId && s.date===ymd);
  if(ov.length) return ov;
  const wd=ymdD(ymd).getUTCDay();
  return DB.recurring.filter(r=>r.emp===empId && r.weekday===wd);
}
function schedBounds(segs){
  if(!segs.length) return null;
  return {start:segs.reduce((a,s)=>Math.min(a,toMin(s.start)),1e9), end:segs.reduce((a,s)=>Math.max(a,toMin(s.end)),0)};
}
// one pass over an employee's punches → { ymd: {any, firstIn, lastOut} } for fast day lookups
function empPunchIndex(empId){
  const e=emp(empId); const idx={};
  punchesForEmp(empId).forEach(p=>{
    const q=partsInTz(p.ts,e.tz); const m=q.hh*60+q.mm;
    const d=idx[q.ymd]||(idx[q.ymd]={any:false,ins:[],outs:[]});
    d.any=true; if(p.type==='in') d.ins.push(m); else if(p.type==='out') d.outs.push(m);
  });
  Object.values(idx).forEach(d=>{ d.firstIn=d.ins.length?Math.min(...d.ins):null; d.lastOut=d.outs.length?Math.max(...d.outs):null; });
  return idx;
}
// date auto-occurrences begin accruing: the later of go-live floor and the employee's first punch.
// null → no punch history yet, so no auto occurrences are inferred at all.
function trackingStartYmd(empId, idx){
  idx=idx||empPunchIndex(empId);
  const ks=Object.keys(idx); const fp=ks.length?ks.sort()[0]:null;
  const floor=CFG.trackingStart||'';
  if(fp&&floor) return fp>floor?fp:floor;
  return fp||floor||null;
}
// true if the employee punched at least once in the Mon–Sun week containing ymd.
// Unapproved-absence points are only inferred in weeks where the person actually clocked in —
// a week with zero punches means they aren't being tracked by the clock that week (salaried, leave not entered, etc.).
function weekHasPunch(idx, ymd){
  if(!idx) return true;
  let d=sundayOf(ymd);
  for(let i=0;i<7;i++){ if(idx[d] && idx[d].any) return true; d=ymdAdd(d,1); }
  return false;
}
function dayPunchBounds(empId, ymd, idx){
  if(idx){ const d=idx[ymd]; return d?{any:d.any,firstIn:d.firstIn,lastOut:d.lastOut}:{any:false,firstIn:null,lastOut:null}; }
  const e=emp(empId);
  const ps=DB.punches.filter(p=>p.emp===empId && partsInTz(p.ts,e.tz).ymd===ymd).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const ins=ps.filter(p=>p.type==='in'), outs=ps.filter(p=>p.type==='out');
  const toM=p=>{const q=partsInTz(p.ts,e.tz);return q.hh*60+q.mm;};
  return {any:ps.length>0, firstIn:ins.length?toM(ins[0]):null, lastOut:outs.length?toM(outs[outs.length-1]):null};
}
function occExcuseKey(emp,ymd,code){return `${emp}|${ymd}|${code}`;}
function isOccExcused(emp,ymd,code){return !!DB.occExcused[occExcuseKey(emp,ymd,code)];}
function dayOccurrences(empId, ymd, idx, floor, today){
  if(today===undefined) today=todayYmd(emp(empId));
  if(ymd>today) return [];                                        // future day — nothing has happened yet
  if(floor===undefined) floor=trackingStartYmd(empId, idx);
  if(!floor || ymd<floor) return [];                              // before this employee was tracked — don't infer absences
  const segs=scheduleFor(empId,ymd); const b=schedBounds(segs); if(!b) return [];
  if(DB.leave.some(l=>l.emp===empId && l.date===ymd)) return []; // approved leave = no points
  const pb=dayPunchBounds(empId,ymd,idx); const occ=[];
  const push=code=>occ.push({code, points:OCC_TYPES[code].points, auto:true, excused:isOccExcused(empId,ymd,code)});
  if(!pb.any){ if(ymd<today && weekHasPunch(idx,ymd)) push('UA'); return occ; }  // absence: only once the day has elapsed AND the person punched that week
  if(pb.firstIn!=null){
    if(pb.firstIn > b.start+CFG.lateMin) push('L');
    else if(pb.firstIn < b.start-CFG.earlyMin) push('CIE');
  }
  if(pb.lastOut!=null && pb.lastOut < b.end-CFG.leaveMin) push('LE');
  return occ;
}
function periodOccurrences(empId, start, stop){
  const today=todayYmd(emp(empId));
  const idx=empPunchIndex(empId); const floor=trackingStartYmd(empId, idx);
  const out=[]; let cur=start;
  while(cur<=stop){
    dayOccurrences(empId,cur,idx,floor,today).forEach(o=>out.push({...o, date:cur}));
    DB.occurrences.filter(m=>m.emp===empId && m.date===cur).forEach(m=>out.push({code:m.code, points:OCC_TYPES[m.code].points, date:cur, auto:false, id:m.id, note:m.note, excused:isOccExcused(empId,cur,m.code)}));
    cur=ymdAdd(cur,1);
  }
  return out;
}
function rollingPoints(empId){
  const today=todayYmd(emp(empId)); const cutoff=ymdAdd(today,-365);
  const idx=empPunchIndex(empId); const floor=trackingStartYmd(empId, idx);
  let pts=0;
  if(floor){                                                     // no floor → no auto occurrences to scan; skip the daily loop
    let cur=floor>cutoff ? floor : cutoff;
    while(cur<=today){ dayOccurrences(empId,cur,idx,floor,today).forEach(o=>{ if(!o.excused) pts+=o.points; }); cur=ymdAdd(cur,1); }
  }
  DB.occurrences.filter(m=>m.emp===empId && m.date>=cutoff && m.date<=today && !isOccExcused(empId,m.date,m.code)).forEach(m=>pts+=OCC_TYPES[m.code].points);
  return Math.round(pts*100)/100;
}
function toggleOccExcuse(empId,ymd,code){
  const k=occExcuseKey(empId,ymd,code); const wk=sundayOf(ymd);
  if(DB.occExcused[k]){ delete DB.occExcused[k]; audit('excuse',empId,wk,null,null,null,me().name,`Occurrence reinstated: ${code}`); }
  else { DB.occExcused[k]={by:me().name,at:new Date().toISOString()}; audit('excuse',empId,wk,null,null,null,me().name,`Occurrence excused (no points): ${code}`); }
  saveStore(); render();
}

// approved leave dated in the future (not yet taken) — subtracted from Available so upcoming PTO shows today
function committedLeave(empId){

function holidaysInRange(start,stop){ return DB.holidays.filter(h=>h.date>=start && h.date<=stop); }
function holidayHours(empId,start,stop){
  const auto=holidaysInRange(start,stop).reduce((s,h)=>s+(h.hours||CFG.holidayHours),0);
  return leavePeriod(empId,start,stop).Holiday + auto;
}
// premium hours: auto meal-violation days (not excused) + manual premiums (rest breaks etc.)
function mealPremiumDays(empId,start,stop){
  const out=[]; let cur=start;
  while(cur<=stop){ const wk=weekKeyFor(cur+'T12:00:00Z',emp(empId));
    const tc=buildTimecard(empId,wk); const d=tc.days.find(x=>x.ymd===cur);
    if(d && d.mealViol){ const flag=d.exceptions.find(x=>x.includes('premium'));
      if(flag && !isExcused(empId,cur,flag)) out.push(cur); }
    cur=ymdAdd(cur,1);
  }
  return out;
}
function premiumHours(empId,start,stop){
  const auto=mealPremiumDays(empId,start,stop).length; // 1 hr each
  const manual=DB.premiums.filter(p=>p.emp===empId && p.date>=start && p.date<=stop).reduce((s,p)=>s+p.hours,0);
  return {auto, manual, total:auto+manual};
}

let PAYVIEW=null;
function buildPayrollRows(start,stop){
  return DB.employees.filter(e=>e.role==='employee').map(e=>{

/* ============================================================
   TENURE-BASED PTO / SICK ACCRUAL ENGINE
   Ported verbatim from the HR Hub PTO tracker (Handbook §7.5).
   Pure functions — compute entitlement, bank, cap, 90-day gate,
   sick reset, and Jan-1 projection from an employee's hire date.
   Settings fixed to the operative Hub policy: 8h/day, 40h sick,
   sick resets Dec 31 (calendar basis).
============================================================ */
function ptoHPD(){return 8;}
function ptoSickHrs(){return 40;}
function ptoSickBasis(){return 'calendar';}
const PTO_TIERS_STD = [
  [0,0,3,null],[1,2,5,10],[3,4,6,10],[5,6,7,10],[7,8,8,12],[9,9,9,12],
  [10,10,10,15],[11,11,11,15],[12,12,12,15],[13,13,13,20],[14,14,14,20],[15,null,15,20]
];
/* Leadership / salaried chart (Leadership-Salaried PTO Chart) */
const PTO_TIERS_LEADER = [
  [0,10,10,15],[11,11,11,15],[12,12,12,15],[13,13,13,20],[14,14,14,20],[15,null,15,20]
];
/* default / legacy alias */
const PTO_TIERS = PTO_TIERS_STD;
/* pick the right chart for an employee (or draft) */
function ptoTiersFor(emp){ return (emp && emp.leadership) ? PTO_TIERS_LEADER : PTO_TIERS_STD; }
function ptoParse(s){ if(!s) return null; const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m) return null; const d=new Date(+m[1],+m[2]-1,+m[3]); return isNaN(d)?null:d; }
function ptoISO(d){ if(!d) return ''; return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function ptoFmt(s){ const d=(s instanceof Date)?s:ptoParse(s); if(!d) return '—'; return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2); }
function ptoFmtLong(d){ if(!d) return '—'; return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function ptoAddDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
function ptoAddYears(d,n){ return new Date(d.getFullYear()+n, d.getMonth(), d.getDate()); }
function ptoDays(a,b){ return Math.floor((b.getTime()-a.getTime())/86400000); }
function ptoTodayISO(){ const d=new Date(); return ptoISO(d); }
function ptoWholeYears(from,to){ if(!from||!to) return 0; let y=to.getFullYear()-from.getFullYear(); const anniv=new Date(to.getFullYear(),from.getMonth(),from.getDate()); if(to<anniv) y--; return Math.max(0,y); }
function ptoTierFor(years, tiers){
  const tbl = tiers || PTO_TIERS_STD;
  for(const t of tbl){ if(years>=t[0] && (t[1]==null || years<=t[1])) return {min:t[0],max:t[1],days:t[2],cap:t[3]}; }
  return {min:0,max:0,days:tbl[0]?tbl[0][2]:0,cap:tbl[0]?tbl[0][3]:null};
}
/* PTO days *added* at a given anniversary — the increase over the prior year (not the full tier amount).
   Standard: year 0 = 3-day base; yr1 +2; yrs 2/4/6/8 +0; yr 3/5/7/9..15 +1; yr 16+ +0.
   Leadership: year 0 = 10-day base; yrs 1-10 +0; yrs 11-15 +1; yr 16+ +0. */
function ptoGrantDays(years, tiers){
  if(years<=0) return ptoTierFor(0, tiers).days;   // base grant at hire
  return Math.max(0, ptoTierFor(years, tiers).days - ptoTierFor(years-1, tiers).days);
}
function ptoASD(emp){
  const hire=ptoParse(emp.hireDate);
  if(!emp || !emp.rehire) return {asd:hire, priorDays:0, gapDays:null, startForNinety:hire};
  const sep=ptoParse(emp.priorSepDate), reh=ptoParse(emp.rehireDate);
  if(hire&&sep&&reh&&sep>=hire&&reh>=sep){ const pd=ptoDays(hire,sep); return {asd:ptoAddDays(reh,-pd), priorDays:pd, gapDays:ptoDays(sep,reh), startForNinety:reh}; }
  if(reh) return {asd:reh, priorDays:0, gapDays:null, startForNinety:reh, warn:'Rehire dates incomplete — tenure counted from rehire date only.'};
  return {asd:hire, priorDays:0, gapDays:null, startForNinety:hire, warn:'Rehire is on but rehire date is missing.'};
}
function ptoTotalDaysAt(asd, date, tiers){ return asd ? ptoTierFor(ptoWholeYears(asd,date), tiers).days : 0; }
function ptoCapHoursAt(asd, date, hpd, tiers){ if(!asd) return null; const t=ptoTierFor(ptoWholeYears(asd,date), tiers); return t.cap==null?null:t.cap*hpd; }
/* anniversary INCREMENT (hours) that occurs during calendar year `calYear` */
function ptoIncHoursInCalYear(asd, calYear, eligible, hpd, tiers){
  if(!asd || !eligible) return 0;
  const anniv=new Date(calYear, asd.getMonth(), asd.getDate());
  if(anniv<=asd) return 0;                       // hire year (or earlier) — no anniversary increment
  const ten=ptoWholeYears(asd, anniv);
  return ten>=1 ? ptoGrantDays(ten, tiers)*hpd : 0;
}
/* advance ONE Jan 1: apply this year's anniversary increment (capped), subtract used,
   then frontload next year's full lump sum (capped). Returns the new start-of-year state. */
function ptoYearTransition(asd, bankStart, calYearStartISO, ptoUsed, eligible, hpd, tiers){
  const cys=ptoParse(calYearStartISO);
  const nextJan1=new Date(cys.getFullYear()+1,0,1);
  const inc=ptoIncHoursInCalYear(asd, cys.getFullYear(), eligible, hpd, tiers);
  const capYE=ptoCapHoursAt(asd, new Date(cys.getFullYear(),11,31), hpd, tiers);
  const afterAnniv=capYE==null ? (+bankStart+inc) : Math.min(+bankStart+inc, capYE);
  const rolled=Math.max(0, afterAnniv-(+ptoUsed||0));
  const lump=eligible ? ptoTotalDaysAt(asd, nextJan1, tiers)*hpd : 0;
  const capNext=ptoCapHoursAt(asd, nextJan1, hpd, tiers);
  const newBank=capNext==null ? rolled+lump : Math.min(rolled+lump, capNext);
  return {bankStart:newBank, calYearStartISO:ptoISO(nextJan1), rolled, lump, added:newBank-rolled, dateISO:ptoISO(nextJan1)};
}
/* simulate from hire (no usage) to the start of the calendar year containing `throughISO` */
function ptoSimulateState(asd, eligible, hpd, throughISO, tiers){
  if(!asd) return {bankStart:0, calYearStartISO:''};
  const through=ptoParse(throughISO)||new Date();
  const janThis=new Date(through.getFullYear(),0,1);
  let bankStart, calYearStartISO=ptoISO(janThis);
  if(asd>janThis){
    // hired this calendar year — only the base hire grant so far (no Jan 1 frontload yet)
    bankStart = eligible ? ptoGrantDays(0, tiers)*hpd : 0;
  } else {
    // established — assume they sit at this year's Jan 1 lump sum, no carried-over rollover
    bankStart = eligible ? ptoTierFor(ptoWholeYears(asd, janThis), tiers).days*hpd : 0;
  }
  return {bankStart, calYearStartISO};
}
/* sick benefit-year start (ISO) for the year containing `d` */
function ptoSickYearStartISO(asd, d){
  if(ptoSickBasis()==='anniversary'){
    if(!asd) return ptoISO(new Date(d.getFullYear(),0,1));
    return ptoISO(ptoAddYears(asd, ptoWholeYears(asd, d)));
  }
  return ptoISO(new Date(d.getFullYear(),0,1));   // calendar — resets Jan 1 (sick deleted Dec 31)
}
function ptoCompute(emp, asOfISO){
  const asOf = ptoParse(asOfISO) || new Date();
  const hire = ptoParse(emp.hireDate);
  const a = ptoASD(emp);
  const asd = a.asd, priorDays=a.priorDays, gapDays=a.gapDays, startForNinety=a.startForNinety||hire;
  const warnings = a.warn ? [a.warn] : [];
  const hpd = ptoHPD();
  const eligible = emp.ptoEligible!==false;
  const tiers = ptoTiersFor(emp);

  const yearsWhole = (asd && asOf) ? ptoWholeYears(asd, asOf) : 0;
  let monthsDisp = 0;
  if(asd){ const lastA=ptoAddYears(asd,yearsWhole); monthsDisp = Math.max(0, Math.floor(ptoDays(lastA, asOf)/30.4375)); }
  const tier = ptoTierFor(yearsWhole, tiers);
  const grantHours = tier.days*hpd;                       // annual entitlement *level* (cumulative), for display
  const thisYearGrant = eligible ? ptoGrantDays(yearsWhole, tiers)*hpd : 0;  // hours actually added at the current anniversary
  const capHours = tier.cap==null? null : tier.cap*hpd;
  const lastAnniv = asd ? ptoAddYears(asd, yearsWhole) : null;
  const nextAnniv = asd ? ptoAddYears(asd, yearsWhole+1) : null;

  // 90-day usability
  const ninetyDate = startForNinety ? ptoAddDays(startForNinety, 90) : null;
  let ninetySatisfied = false;
  if(emp.rehire && gapDays!=null && gapDays<365 && priorDays>=90){ ninetySatisfied=true; }
  const ptoUsable = ninetySatisfied || (ninetyDate && asOf>=ninetyDate);

  // ── PTO bank (auto-maintained: bankStart = balance right after this calendar year's Jan 1 frontload) ──
  let bankStart = +emp.bankStart;
  if(emp.bankStart==null){ bankStart = ptoSimulateState(asd, eligible, hpd, asOfISO, tiers).bankStart; }
  const calYearStart = ptoParse(emp.calYearStart) || (asd? new Date(asOf.getFullYear(),0,1) : null);
  const ptoUsed = +emp.ptoUsed||0;

  // anniversary increment that occurs THIS calendar year, and whether it has happened yet
  const annivThisCalYear = (asd && calYearStart) ? new Date(calYearStart.getFullYear(), asd.getMonth(), asd.getDate()) : null;
  const annivThisYearReal = !!(annivThisCalYear && annivThisCalYear>asd);
  const annivPassed = !!(annivThisYearReal && annivThisCalYear<=asOf);
  const incThisCalYear = annivThisYearReal && eligible ? ptoGrantDays(ptoWholeYears(asd, annivThisCalYear), tiers)*hpd : 0;
  const capNow = capHours;  // cap at current tenure
  const bankNow = annivPassed ? (capNow==null? bankStart+incThisCalYear : Math.min(bankStart+incThisCalYear, capNow)) : bankStart;
  const ptoAvailable = Math.max(0, bankNow - ptoUsed);

  // ── projection: balance that ROLLS OVER into next year (year-end), then the Jan 1 frontload ──
  const yearEndAfterAnniv = (capNow==null) ? bankStart+incThisCalYear : Math.min(bankStart+incThisCalYear, capNow); // includes this year's increment (applied by Dec 31)
  const rolloverHours = Math.max(0, yearEndAfterAnniv - ptoUsed);
  const nextJan1 = calYearStart ? new Date(calYearStart.getFullYear()+1,0,1) : null;
  const tenureNextJan1 = (asd && nextJan1) ? ptoWholeYears(asd, nextJan1) : yearsWhole;
  const lumpNextDays = eligible ? ptoTierFor(tenureNextJan1, tiers).days : 0;
  const lumpNextHours = lumpNextDays*hpd;
  const capNextJan1 = ptoCapHoursAt(asd, nextJan1||asOf, hpd, tiers);
  const nextJan1Balance = (capNextJan1==null) ? rolloverHours+lumpNextHours : Math.min(rolloverHours+lumpNextHours, capNextJan1);
  const addedAtJan1 = Math.max(0, nextJan1Balance - rolloverHours);
  const forfeitAtJan1 = Math.max(0, (rolloverHours+lumpNextHours) - nextJan1Balance);

  // ── next anniversary increment (the tier step-up) ──
  const nextYears = yearsWhole+1;
  const nextTier = ptoTierFor(nextYears, tiers);
  const nextGrant = eligible ? ptoGrantDays(nextYears, tiers)*hpd : 0;
  const nextGrantDays = eligible ? ptoGrantDays(nextYears, tiers) : 0;

  // ── sick (frontloaded 40, usable from 90-day, resets each benefit year) ──
  const sickFront = ptoSickHrs();
  const sickUsed = +emp.sickUsed||0;
  const sickAvailable = ptoUsable ? Math.max(0, sickFront - sickUsed) : 0;   // not usable until 90-day
  const sickYearStartISO = emp.sickYearStart || ptoSickYearStartISO(asd, asOf);
  const sickResetDate = (ptoSickBasis()==='calendar')
    ? new Date(asOf.getFullYear(),11,31)
    : ptoAddDays(ptoAddYears(ptoParse(sickYearStartISO)||asOf,1),-1);

  // upcoming events within 45 days
  let soonAnniv=null, soonDays=null;
  if(eligible && nextAnniv && nextAnniv>asOf){ const dd=ptoDays(asOf,nextAnniv); if(dd<=45){ soonAnniv=nextAnniv; soonDays=dd; } }
  let soonJan1=null, soonJan1Days=null;
  if(nextJan1 && nextJan1>asOf){ const dd=ptoDays(asOf,nextJan1); if(dd<=45){ soonJan1=nextJan1; soonJan1Days=dd; } }
  // recently auto-applied (last 30 days)
  let recentApplied=null;
  if(emp.lastApplied && emp.lastApplied.dateISO){ const d=ptoParse(emp.lastApplied.dateISO); if(d && asOf>=d && ptoDays(d,asOf)<=30) recentApplied=emp.lastApplied; }
  // 90-day just reached (within 30 days)
  let ninetyRecent=false;
  if(!ninetySatisfied && ninetyDate && asOf>=ninetyDate && ptoDays(ninetyDate,asOf)<=30) ninetyRecent=true;

  return {asOf, hire, asd, yearsWhole, monthsDisp, tier, hpd, grantHours, thisYearGrant, capHours,
    lastAnniv, nextAnniv, ninetyDate, ninetySatisfied, ptoUsable, startForNinety, gapDays, priorDays,
    bankStart, calYearStart, ptoUsed, ptoAvailable, rolloverHours, annivPassed, incThisCalYear,
    nextYears, nextTier, nextGrant, nextGrantDays,
    nextJan1, tenureNextJan1, lumpNextDays, lumpNextHours, nextJan1Balance, addedAtJan1, forfeitAtJan1,
    sickFront, sickUsed, sickAvailable, sickYearStartISO, sickResetDate,
    eligible, warnings, soonAnniv, soonDays, soonJan1, soonJan1Days, recentApplied, ninetyRecent, leadership:!!emp.leadership};
}
function ptoH(h){ if(h==null) return '—'; const r=Math.round(h*10)/10; return (Number.isInteger(r)?r:r.toFixed(1))+'h'; }
function ptoHd(h){ const hpd=ptoHPD(); const d=h/hpd; const r=Math.round(d*10)/10; return (Number.isInteger(r)?r:r.toFixed(1))+'d'; }

// --- Hours-detail: Accruals tab (tenure-based PTO / Sick per policy §7.5) ---
function accrualsTab(empId, start, stop){
  const e=emp(empId);
  const com=committedLeave(empId);
  const pUse=e.pto?.used||0, sUse=e.sick?.used||0;
  const pCom=com.PTO+com.Bereavement, sCom=com.Sick;
  const row=(name,icon,all,used,committed,avail,kind)=>{
    const usedCell = used>0
      ? `<td class="num accr-link" onclick="showAccrual('${empId}','${kind}','used')" title="View dates used">${h2(used)}</td>`
      : `<td class="num">${h2(used)}</td>`;
    const comCell = committed>0
      ? `<td class="num accr-link" onclick="showAccrual('${empId}','${kind}','committed')" title="View committed dates">${h2(committed)}</td>`
      : `<td class="num">—</td>`;
    return `<tr>
      <td><i class="ti ${icon}" style="color:var(--muted)"></i> <b>${name}</b></td>
      <td class="num">${all==null?'—':h2(all)}</td>
      ${usedCell}
      ${comCell}
      <td class="num"><b style="color:${avail<0?'var(--bad)':'var(--navy)'}">${h2s(avail)}</b></td></tr>`;
  };

  // ── no hire date → can't compute tenure; fall back to any synced allotments ──
  if(!e.hireDate){
    const pAll=e.pto?.allot||0, sAll=e.sick?.allot||0;
    return `<div class="card">
      <div class="reqbanner act"><div class="reqrow"><i class="ti ti-alert-triangle"></i>
        <div><b>No hire date on file</b><div class="reqmeta">PTO &amp; sick are calculated from tenure. Add this employee's hire date to their record and balances will compute automatically.</div></div>
        ${me().role==='hr'?`<button class="btn primary sm" onclick="openAccrEdit('${empId}')"><i class="ti ti-calendar-plus"></i> Add hire date</button>`:''}</div></div>
      <table class="wtable"><thead><tr><th>Type</th><th class="num">Allotted</th><th class="num">Used YTD</th><th class="num">Committed</th><th class="num">Available</th></tr></thead>
      <tbody>
        ${row('PTO','ti-beach',pAll,pUse,pCom,pAll-pUse-pCom,'pto')}
        ${row('Sick','ti-first-aid-kit',sAll,sUse,sCom,sAll-sUse-sCom,'sick')}
      </tbody></table>
      <div class="hint" style="margin-top:12px"><i class="ti ti-info-circle"></i> Click a <b>Used YTD</b> or <b>Committed</b> value to see the dates. Times shown as h:mm.</div>
    </div>`;
  }

  // ── tenure mode ──
  const c = ptoCompute({ hireDate:e.hireDate, rehire:e.rehire, priorSepDate:e.priorSepDate, rehireDate:e.rehireDate,
    leadership:e.leadership, ptoEligible:e.ptoEligible, ptoUsed:pUse, sickUsed:sUse }, todayYmd(e));

  const ptoAll = c.eligible ? c.grantHours : null;                 // this year's PTO entitlement (by tier)
  const ptoAvail = c.eligible ? Math.max(0, c.ptoAvailable - pCom) : 0;
  const sickAvail = Math.max(0, c.sickAvailable - sCom);           // sickAvailable already 90-day gated

  const tenureStr = c.yearsWhole>0 ? `${c.yearsWhole} yr${c.yearsWhole===1?'':'s'}${c.monthsDisp?` ${c.monthsDisp} mo`:''}` : `${c.monthsDisp} mo`;
  const typeLabel = !c.eligible ? 'Part-time · not PTO-eligible' : (c.leadership ? 'Leadership / salaried' : 'Hourly');
  const ninety = c.ptoUsable ? 'past 90-day mark' : `usable after 90 days (${ptoFmt(c.ninetyDate)})`;
  const capStr = (c.capHours==null) ? 'no cap' : `cap ${h2(c.capHours)}`;
  const nextIncTxt = c.nextGrant>0 ? `+${h2(c.nextGrant)}` : 'no increase';

  return `<div class="card">
    <div class="reqbanner info"><div class="reqrow"><i class="ti ti-user-heart"></i>
      <div><b>Tenure-based accrual · ${typeLabel}</b>
      <div class="reqmeta">Service date <b>${ptoFmt(c.asd)}</b>${e.rehire?' <span class="src">bridged</span>':''} · <b>${tenureStr}</b> of service · PTO ${ninety} · ${capStr}${c.warnings.length?` · <span style="color:var(--warn)">${c.warnings[0]}</span>`:''}</div></div>
      ${me().role==='hr'?`<button class="btn ghost sm" onclick="openAccrEdit('${empId}')"><i class="ti ti-pencil"></i> Edit</button>`:''}</div></div>
    <table class="wtable"><thead><tr><th>Type</th><th class="num">Allotted</th><th class="num">Used YTD</th><th class="num">Committed</th><th class="num">Available</th></tr></thead>
    <tbody>
      ${row('PTO','ti-beach',ptoAll,pUse,pCom,ptoAvail,'pto')}
      ${row('Sick','ti-first-aid-kit',c.sickFront,sUse,sCom,sickAvail,'sick')}
    </tbody></table>
    <div class="hint" style="margin-top:10px"><i class="ti ti-calendar-event"></i> Next anniversary <b>${c.nextAnniv?ptoFmt(c.nextAnniv):'—'}</b> (${nextIncTxt}) · projected PTO on Jan 1 <b>${h2(c.nextJan1Balance)}</b>${c.forfeitAtJan1>0?` · ~${h2(c.forfeitAtJan1)} would exceed the cap`:''}.</div>
    <div class="hint" style="margin-top:6px"><i class="ti ti-info-circle"></i> Allotted &amp; Available compute from tenure per the 2026 PTO policy (§7.5) — ${c.leadership?'leadership':'hourly'} chart, 8h = 1 day, sick frontloaded ${h2(c.sickFront)} and resets Dec 31. <b>Committed</b> = approved future leave, already subtracted from Available. Click a <b>Used YTD</b> or <b>Committed</b> value for the dates. Times shown as h:mm.</div>
  </div>`;
}

// --- Accrual detail popup: dates behind a Used YTD or Committed value ---
let ACCR=null;
function showAccrual(empId,kind,col){
  EDIT=null;REQ=null;SEDIT=null;LEDIT=null;OEDIT=null;PEDIT=null;HEDIT=null;NEDIT=null;LNOTE=null;PUNCH=null;PAYVIEW=null;
  ACCR={empId,kind,col}; render();
}
function closeAccrual(){ ACCR=null; render(); }
function renderAccrualModal(){
  const host=document.getElementById('modal'); if(!ACCR){ host.innerHTML=''; host.classList.remove('show'); return; }
  const {empId,kind,col}=ACCR; const e=emp(empId);
  const types = kind==='pto' ? ['PTO','Bereavement'] : ['Sick'];
  const label = kind==='pto' ? 'PTO' : 'Sick';
  const today=todayYmd(e); const yearStart=today.slice(0,4)+'-01-01';
  let entries, title, sub, syncedTotal=null;
  if(col==='committed'){
    entries = DB.leave.filter(l=>l.emp===empId && types.includes(l.type) && l.date>today);
    title = `${label} — Committed (upcoming)`;
    sub = 'Approved leave dated in the future. These hours are already subtracted from Available.';
  } else {
    entries = DB.leave.filter(l=>l.emp===empId && types.includes(l.type) && l.date>=yearStart && l.date<=today);
    title = `${label} — Used year-to-date`;
    sub = 'Leave recorded in the timekeeping portal so far this year.';
    syncedTotal = kind==='pto' ? (e.pto?.used||0) : (e.sick?.used||0);
  }
  entries=entries.sort((a,b)=>a.date.localeCompare(b.date));
  const localSum=Math.round(entries.reduce((s,l)=>s+l.hours,0)*100)/100;
  const rows = entries.length ? entries.map(l=>{
    const dt=ymdD(l.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
    return `<tr><td>${dt} <span class="ltag ${l.type.toLowerCase()}" style="cursor:default">${l.type}</span></td>
      <td class="num"><b>${h2(l.hours)}</b></td><td class="hint">${l.note||''}</td></tr>`;
  }).join('') : `<tr><td colspan="3" class="hint" style="padding:16px;text-align:center">No dated entries recorded in the timekeeping portal.</td></tr>`;
  let recon='';
  if(col==='used'){
    const diff=Math.round((syncedTotal-localSum)*100)/100;
    if(Math.abs(diff)>0.001) recon=`<div class="hint" style="margin-top:10px"><i class="ti ti-info-circle"></i> HR Hub reports <b>${h2(syncedTotal)}</b> used YTD; <b>${h2(localSum)}</b> is dated in the timekeeping portal above. The remaining <b>${h2(Math.abs(diff))}</b> is tracked in the HR Hub PTO tracker.</div>`;
  }
  host.innerHTML=`<div class="modalcard"><div class="modalhead">
      <div><b>${title}</b><div class="hint">${e.name} · ID ${e.empId}</div></div>
      <button class="btn ghost sm" onclick="closeAccrual()"><i class="ti ti-x"></i></button></div>
    <div class="modalbody">
      <div class="hint" style="margin-bottom:12px">${sub}</div>
      <table class="wtable"><thead><tr><th>Date</th><th class="num">Hours</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td style="text-align:right"><b>Total</b></td><td class="num"><b>${h2(localSum)}</b></td><td></td></tr></tfoot>
      </table>${recon}
    </div>
    <div class="modalfoot"><button class="btn primary" onclick="closeAccrual()">Close</button></div></div>`;
  host.classList.add('show');
}

// --- Accrual profile editor: hire date & tenure inputs that drive the accrual engine ---
let ACCRED=null;

  EDIT=null;REQ=null;SEDIT=null;LEDIT=null;OEDIT=null;PEDIT=null;HEDIT=null;NEDIT=null;LNOTE=null;PUNCH=null;PAYVIEW=null;ACCR=null;
  const e=emp(empId);
  ACCRED={ empId, hireDate:e.hireDate||'', leadership:!!e.leadership, ptoEligible:e.ptoEligible!==false,
           rehire:!!e.rehire, priorSepDate:e.priorSepDate||'', rehireDate:e.rehireDate||'' };
  render();
}
function closeAccrEdit(){ ACCRED=null; render(); }
function accrEdSet(k,v){ ACCRED[k]=v; renderAccrEditModal(); }
function saveAccrEdit(){
  const d=ACCRED; if(!d.hireDate){ toast('Hire date is required'); return; }
  const e=emp(d.empId);
  const patch={ hireDate:d.hireDate, leadership:!!d.leadership, ptoEligible:!!d.ptoEligible,
    rehire:!!d.rehire, priorSepDate:d.rehire?(d.priorSepDate||null):null, rehireDate:d.rehire?(d.rehireDate||null):null };
  Object.assign(e, patch);
  chk(Store.updateEmployee(e.id, patch),'Employee');
  ACCRED=null; toast('Accrual profile saved'); render();
}

      </div><div class="hint" style="margin-top:6px">Hire date above = <b>original</b> hire; tenure counts prior service up to the separation, then resumes at rehire.</div>`:''}
    </div>
    <div class="modalfoot"><button class="btn ghost" onclick="closeAccrEdit()">Cancel</button>
      <button class="btn primary" onclick="saveAccrEdit()"><i class="ti ti-check"></i> Save</button></div></div>`;
  host.classList.add('show');
}

// --- Hours-detail: this employee's effective schedule for the period ---
function hoursSchedGrid(empId, start, stop){
  const wknd=!!HOURS.schedWeekends; const cols=wknd?7:5;
  let cur=sundayOf(start); const blocks=[];
  while(cur<=stop){
    const days=daysOfWeek(cur,wknd);
    const label=`${dayLabel(days[0]).slice(0,5)} - ${dayLabel(days[days.length-1]).slice(0,5)}`;
    blocks.push(`<div class="week-label">${label}</div>
      <div class="week-grid" style="grid-template-columns:repeat(${cols},1fr)">
        ${days.map(ymd=>{
          const segs=scheduleFor(empId,ymd);
          const tot=segs.reduce((s,x)=>s+segMin(x.start,x.end),0);
          const chips=segs.map(s=> s.date
            ? segChip(s,'overrides')
            : `<div class="seg-chip" style="cursor:default"><b>${fmt12(s.start)}–${fmt12(s.end)}</b><span>${s.jobCode||''} · ${h2(segMin(s.start,s.end)/60)} · template</span></div>`).join('');
          return `<div class="day-cell"><div class="day-head"><span>${dayLabel(ymd)}</span><b>${h2(tot/60)}</b></div>
            <div class="day-body">${chips}
            <button class="add-seg" onclick="openSched('${empId}',{mode:'overrides',date:'${ymd}'})"><i class="ti ti-plus"></i> Add</button></div></div>`;
        }).join('')}
      </div>`);
    cur=ymdAdd(cur,7);
  }
  return `<div class="sched-note">Effective schedule — dated overrides shown over the recurring template. <b>Add</b> creates a dated override; the recurring template is managed on the all-employee <b>Schedules</b> screen.</div>${blocks.join('')}`;
}

// generic browser download for text/CSV
function dlFile(name, text, mime){
  const blob=new Blob([text], {type:(mime||'text/plain')+';charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
}
function csvCell(v){ v=(v==null?'':String(v)); return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function csvOf(rows){ return rows.map(r=>r.map(csvCell).join(',')).join('\r\n'); }
