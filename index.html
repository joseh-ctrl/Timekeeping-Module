/* ---------- SCHEDULES: weekly grid (overrides + recurring) ---------- */
let SCHED=null, SEDIT=null;
const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function segMin(s,e){const[a,b]=s.split(':').map(Number);const[c,d]=e.split(':').map(Number);return (c*60+d)-(a*60+b);}
function initSched(){
  const ok=scopeIds(); const list=filterSortEmps('id','').filter(e=>ok.has(e.id));
  const pick=list.find(e=>DB.schedules.some(s=>s.emp===e.id))||list[0]||me();
  const sun=sundayOf(todayYmd(pick));
  SCHED={empId:pick.id, sort:'id', search:'', tab:'overrides', weekends:false, preset:'two', start:sun, stop:ymdAdd(sun,13)};
}
function schedSelect(id){ SCHED.empId=id; render(); }
function schedSort(v){ SCHED.sort=v; render(); }
function schedSearch(v){ SCHED.search=v; render(); }
function schedTab(v){ SCHED.tab=v; render(); }
function schedWeekends(){ SCHED.weekends=!SCHED.weekends; render(); }
function schedPreset(v){
  SCHED.preset=v; const sun=sundayOf(todayYmd(emp(SCHED.empId)||me()));
  if(v==='thisweek'){ SCHED.start=sun; SCHED.stop=ymdAdd(sun,6); }
  else if(v==='two'){ SCHED.start=sun; SCHED.stop=ymdAdd(sun,13); }
  else if(v==='month'){ const t=todayYmd(emp(SCHED.empId)||me()); SCHED.start=t.slice(0,8)+'01'; const d=ymdD(SCHED.start); SCHED.stop=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,0)).toISOString().slice(0,10); }
  render();
}
function schedDate(f,v){ SCHED[f]=v; SCHED.preset='custom'; render(); }
function schedNav(dir){ const ok=scopeIds(); const list=filterSortEmps(SCHED.sort,SCHED.search).filter(e=>ok.has(e.id)); const i=list.findIndex(e=>e.id===SCHED.empId);
  const ni=Math.min(list.length-1,Math.max(0,(i<0?0:i)+dir)); if(list[ni]){SCHED.empId=list[ni].id;render();} }

function daysOfWeek(mon, weekends){
  const d=[0,1,2,3,4].map(i=>ymdAdd(mon,i));        // Mon–Fri
  if(weekends){ d.push(ymdAdd(mon,5)); d.push(ymdAdd(mon,6)); } // Sat, Sun
  return d;
}
function dayLabel(ymd){ const dt=ymdD(ymd); return `${String(dt.getUTCMonth()+1).padStart(2,'0')}/${String(dt.getUTCDate()).padStart(2,'0')} (${WD[dt.getUTCDay()]})`; }
function segChip(seg, mode){
  const mins=segMin(seg.start,seg.end);
  return `<button class="seg-chip" onclick='openSchedEdit(${JSON.stringify(seg).replace(/'/g,"&#39;")},"${mode}")'>
    <b>${fmt12(seg.start)}–${fmt12(seg.end)}</b><span>${seg.jobCode||''} · ${h2(mins/60)}</span></button>`;
}

function openSched(empId, ctx){ EDIT=null;REQ=null;
  SEDIT={empId, mode:ctx.mode, date:ctx.date||null, weekday:(ctx.weekday??null), start:'08:00', end:'16:30', jobCode:JOBCODES[0], note:'', id:null}; render(); }
function openSchedEdit(seg, mode){ EDIT=null;REQ=null;
  SEDIT={empId:seg.emp, mode, date:seg.date||null, weekday:(seg.weekday??null), start:seg.start, end:seg.end, jobCode:seg.jobCode||JOBCODES[0], note:seg.note||'', id:seg.id}; render(); }
function seSet(f,v){ SEDIT[f]=v; }
function closeSched(){ SEDIT=null; render(); }
function saveSched(){
  if(SEDIT.end<=SEDIT.start){ toast('End time must be after start'); return; }
  if(SEDIT.mode==='overrides'){
    let s; if(SEDIT.id){ s=DB.schedules.find(x=>x.id===SEDIT.id); Object.assign(s,{start:SEDIT.start,end:SEDIT.end,jobCode:SEDIT.jobCode,note:SEDIT.note}); }
    else { s={id:'sc'+Date.now(),emp:SEDIT.empId,date:SEDIT.date,start:SEDIT.start,end:SEDIT.end,jobCode:SEDIT.jobCode,note:SEDIT.note}; DB.schedules.push(s); }

    else { s={id:'rc'+Date.now(),emp:SEDIT.empId,weekday:SEDIT.weekday,start:SEDIT.start,end:SEDIT.end,jobCode:SEDIT.jobCode}; DB.recurring.push(s); }
    chk(Store.saveRecurring(s),'Schedule');

}

  if(SEDIT.id){ if(SEDIT.mode==='overrides'){ DB.schedules=DB.schedules.filter(x=>x.id!==SEDIT.id); chk(Store.removeSchedule(SEDIT.id),'Schedule'); }
    else { DB.recurring=DB.recurring.filter(x=>x.id!==SEDIT.id); chk(Store.removeRecurring(SEDIT.id),'Schedule'); } }

/* ---------- REPORTS: builder, CSV/PDF export, saved configs ---------- */
const REPORT_FIELDS={
  empId:{label:'ID'}, name:{label:'Employee'}, dept:{label:'Department'}, state:{label:'State'},
  manager:{label:'Manager'}, rate:{label:'Rate',num:true,money:true},
  reg:{label:'Reg',num:true}, ot1:{label:'OT1',num:true}, ot2:{label:'OT2',num:true}, prem:{label:'Prem',num:true},
  pto:{label:'PTO',num:true}, sick:{label:'Sick',num:true}, holiday:{label:'Holiday',num:true}, total:{label:'Total',num:true},
  points:{label:'Points',num:true}, tier:{label:'Standing'}
};
const REPORT_PRESETS={
  hours:{label:'Period Hours', cols:['empId','name','dept','reg','ot1','ot2','prem','pto','sick','holiday','total'], group:''},
  dept:{label:'Department Summary', cols:['dept','reg','ot1','ot2','prem','pto','sick','holiday','total'], group:'dept'},
  attendance:{label:'Attendance & Points', cols:['empId','name','dept','points','tier'], group:''}
};
let REPORT=null;
function initReport(){
  const t=todayYmd(me()); const s=payPeriodStart(t);
  REPORT={cols:REPORT_PRESETS.hours.cols.slice(), group:'', start:s, stop:ymdAdd(s,13), preset:'thispp', filterDept:'', saveName:'',
          tcEmp:(DB.employees.find(e=>e.role==='employee')||{}).id};
}
function recordFor(e,start,stop){
  const w=buildPeriod(e.id,start,stop); const lv=leavePeriod(e.id,start,stop);
  const prem=premiumHours(e.id,start,stop).total; const hol=holidayHours(e.id,start,stop);
  const pto=lv.PTO+lv.Bereavement, sick=lv.Sick; const pts=rollingPoints(e.id);
  return {empId:e.empId,name:e.name,dept:e.dept,state:e.loc,manager:emp(e.mgr)?emp(e.mgr).name:'',rate:e.rate||0,
    reg:w.reg,ot1:w.ot,ot2:w.dt,prem,pto,sick,holiday:hol,total:w.reg+w.ot+w.dt+prem+pto+sick+hol,
    points:pts,tier:disciplineTier(pts).label};
}
function reportRecords(){
  const ok=scopeIds();
  return DB.employees.filter(e=>e.role==='employee' && ok.has(e.id) && (!REPORT.filterDept||e.dept===REPORT.filterDept))
    .sort((a,b)=>(a.dept||'').localeCompare(b.dept||'')||a.name.localeCompare(b.name))
    .map(e=>recordFor(e,REPORT.start,REPORT.stop));
}
function reportGrouped(){
  const recs=reportRecords();
  if(!REPORT.group) return [{key:null, rows:recs}];
  const g={}; recs.forEach(r=>{ const k=r[REPORT.group]||'—'; (g[k]=g[k]||[]).push(r); });
  return Object.keys(g).sort().map(k=>({key:k, rows:g[k]}));
}
function fmtCell(c,v){ const f=REPORT_FIELDS[c]; if(f.num) return (f.money?'$':'')+(+v||0).toFixed(2); return v??''; }
function subtotal(rows,c){ return rows.reduce((s,r)=>s+(+r[c]||0),0); }

function reportPreset(k){ const p=REPORT_PRESETS[k]; REPORT.cols=p.cols.slice(); REPORT.group=p.group; render(); }
function reportToggleCol(c){ REPORT.cols=REPORT.cols.includes(c)?REPORT.cols.filter(x=>x!==c):[...REPORT.cols,c]; render(); }
function reportGroupBy(v){ REPORT.group=v; render(); }
function reportFilter(v){ REPORT.filterDept=v; render(); }
function reportRange(v){ REPORT.preset=v; const t=todayYmd(me()); const sun=sundayOf(t);
  if(v==='thispp'){ REPORT.start=payPeriodStart(t); REPORT.stop=ymdAdd(REPORT.start,13); }
  else if(v==='lastpp'){ REPORT.start=ymdAdd(payPeriodStart(t),-14); REPORT.stop=ymdAdd(REPORT.start,13); }
  else if(v==='thisweek'){ REPORT.start=sun; REPORT.stop=ymdAdd(sun,6); }
  else if(v==='thismonth'){ REPORT.start=t.slice(0,8)+'01'; const d=ymdD(REPORT.start); REPORT.stop=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,0)).toISOString().slice(0,10); }
  else if(v==='ytd'){ REPORT.start=t.slice(0,4)+'-01-01'; REPORT.stop=t; }
  render();
}
function reportDate(f,v){ REPORT[f]=v; REPORT.preset='custom'; render(); }

function download(text,fname,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=fname; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function reportName(){ return `WSDisplay_report_${REPORT.start}_${REPORT.stop}`; }
function exportReportCSV(){
  const cols=REPORT.cols; const groups=reportGrouped();
  const lines=[cols.map(c=>REPORT_FIELDS[c].label).join(',')];
  const cell=(c,v)=>{ const f=REPORT_FIELDS[c]; if(f.num) return (+v||0).toFixed(2); return `"${(v??'').toString().replace(/"/g,'""')}"`; };
  groups.forEach(g=>{ g.rows.forEach(r=>lines.push(cols.map(c=>cell(c,r[c])).join(','))); });
  download(lines.join('\n'), reportName()+'.csv','text/csv');
}
function exportReportPDF(){
  if(!window.jspdf){ toast('PDF library still loading — try again'); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'landscape'});
  const cols=REPORT.cols; const head=[cols.map(c=>REPORT_FIELDS[c].label)]; const body=[];
  reportGrouped().forEach(g=>{
    if(g.key!==null) body.push([{content:g.key,colSpan:cols.length,styles:{fontStyle:'bold',fillColor:[238,242,255]}}]);
    g.rows.forEach(r=>body.push(cols.map(c=>fmtCell(c,r[c]))));
    if(g.key!==null) body.push(cols.map((c,i)=> i===0?'Subtotal':(REPORT_FIELDS[c].num?fmtCell(c,subtotal(g.rows,c)):'')));
  });
  doc.setFontSize(13); doc.text('WS Display — Timekeeping Report',14,14);
  doc.setFontSize(9); doc.text(`${REPORT.start} to ${REPORT.stop}${REPORT.filterDept?' · '+REPORT.filterDept:''}`,14,20);
  doc.autoTable({head,body,startY:24,styles:{fontSize:8},headStyles:{fillColor:[15,30,61]}});
  doc.save(reportName()+'.pdf');
}
function exportTimecard(empId,fmt){
  const e=emp(empId); const pd=buildPeriod(empId,REPORT.start,REPORT.stop); const rows=[];
  pd.weeks.forEach(wk=>buildTimecard(empId,wk).days.forEach(d=>{
    const io=d.punches.map(p=>fmtTime(p.ts,e)+' '+labelType(p.type)).join(', ');
    rows.push([d.ymd, io, d.hrs.toFixed(2), d.exceptions.join('; ')]);
  }));
  if(fmt==='csv'){
    const lines=[['Date','Punches','Hours','Flags'].join(',')];
    rows.forEach(r=>lines.push(r.map(x=>`"${(x||'').toString().replace(/"/g,'""')}"`).join(',')));
    lines.push(''); lines.push(`"Reg",${pd.reg.toFixed(2)}`,`"OT1",${pd.ot.toFixed(2)}`,`"OT2",${pd.dt.toFixed(2)}`,`"Total",${pd.total.toFixed(2)}`);
    download(lines.join('\n'),`timecard_${e.empId}_${REPORT.start}.csv`,'text/csv'); return;
  }
  if(!window.jspdf){ toast('PDF library still loading — try again'); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  doc.setFontSize(14); doc.text('WS Display — Timecard',14,16);
  doc.setFontSize(10); doc.text(`${e.name}  (ID ${e.empId})  ·  ${e.dept}  ·  ${e.loc}`,14,23);
  doc.text(`Period ${REPORT.start} – ${REPORT.stop}`,14,29);
  doc.autoTable({head:[['Date','Punches','Hours','Flags']],body:rows,startY:34,styles:{fontSize:8},headStyles:{fillColor:[15,30,61]}});
  const y=(doc.lastAutoTable?doc.lastAutoTable.finalY:40)+8;
  doc.setFontSize(10); doc.text(`Reg ${pd.reg.toFixed(2)}    OT1 ${pd.ot.toFixed(2)}    OT2 ${pd.dt.toFixed(2)}    Total ${pd.total.toFixed(2)}`,14,y);
  doc.save(`timecard_${e.empId}_${REPORT.start}.pdf`);
}
function saveReportConfig(){
  if(!REPORT.saveName.trim()){ toast('Name the report'); return; }

      <div class="hint" style="margin-top:4px">Attendance points don't accrue before the go-live date. Leave it blank to start from each employee's first punch. Unapproved absences are only counted in weeks the employee actually clocked in.</div>
    </div>
    <div class="card" style="grid-column:1/-1">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0"><i class="ti ti-confetti"></i> Company holidays</h2>
        <button class="btn primary sm" onclick="openHoliday()"><i class="ti ti-plus"></i> Add holiday</button>
      </div>
      <div style="margin-top:12px">${hols.length?`<table><thead><tr><th>Date</th><th>Holiday</th><th class="num">Paid hrs</th><th></th></tr></thead><tbody>
        ${hols.map(h=>`<tr><td>${ymdD(h.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',timeZone:'UTC'})}</td>
          <td>${h.name}</td><td class="num">${h2(h.hours)}</td>
          <td style="text-align:right"><button class="excuse-btn" onclick="openHoliday('${h.id}')">edit</button></td></tr>`).join('')}
      </tbody></table>`:`<div class="empty">No holidays yet. Add your company holiday calendar.</div>`}</div>
      <div class="hint" style="margin-top:8px">Everyone receives Holiday hours on these dates; working a holiday is paid at the regular rate (no premium).</div>
    </div>
    <div class="card" style="grid-column:1/-1">
      <h2><i class="ti ti-scale"></i> Overtime &amp; meal law (by state)</h2>
      <table><thead><tr><th>State</th><th>Overtime</th><th>Meal law</th></tr></thead><tbody>
        <tr><td>California</td><td>Daily 8h→1.5x, 12h→2x · weekly 40 · 7th-consecutive-day rule</td><td>30-min meal before 5th hour; premium owed</td></tr>
        <tr><td>Pennsylvania</td><td>Weekly 40h→1.5x (federal)</td><td>No state mandate</td></tr>
      </tbody></table>
      <div class="hint" style="margin-top:8px">Each employee's state (set in the Employee tab) selects their ruleset automatically.</div>
    </div>
  </div>`;
}

/* ---------- EMPLOYEE: roster, settings, manager access ---------- */
function viewEmployee(){
  const managers = DB.employees.filter(e=>e.role!=='employee');
  const emps = DB.employees.filter(e=>e.role==='employee').sort((a,b)=>a.name.localeCompare(b.name));
  return `<div class="pagehead"><div><h1>Employee</h1><p>Profiles, timezones, pay rules, and manager access.</p></div></div>
  <div class="card">
    <h2><i class="ti ti-users"></i> Roster <span class="cbadge" style="background:var(--muted)">${emps.length}</span></h2>
    <table class="roster"><thead><tr><th>ID</th><th>Employee</th><th>Dept</th><th>State</th><th>Timezone</th><th>Manager</th><th class="num">Rate $/hr</th><th>Web clock</th><th>Remote</th></tr></thead><tbody>
    ${emps.map(e=>`
      <tr>
        <td><input class="cell-in" style="width:66px" value="${e.empId||''}" onchange="setField('${e.id}','empId',this.value.trim())"></td>
        <td><div class="who">${e.name}</div>
            <input class="cell-in" type="email" style="width:190px;margin-top:4px" placeholder="email address" value="${e.email||''}" onchange="setField('${e.id}','email',this.value.trim())"></td>
        <td><input class="cell-in" style="width:140px" value="${e.dept||''}" onchange="setField('${e.id}','dept',this.value.trim())"></td>
        <td><select onchange="setField('${e.id}','loc',this.value)">
            ${STATES.map(s=>`<option value="${s}" ${e.loc===s?'selected':''}>${STATE_RULES[s].label} (${s})</option>`).join('')}
          </select></td>
        <td><select onchange="setField('${e.id}','tz',this.value)">
            ${Object.entries(TZ).map(([k,v])=>`<option value="${k}" ${e.tz===k?'selected':''}>${v}</option>`).join('')}
          </select></td>
        <td><select onchange="setField('${e.id}','mgr',this.value)">
            ${managers.map(m=>`<option value="${m.id}" ${e.mgr===m.id?'selected':''}>${m.name}</option>`).join('')}
          </select></td>
        <td class="num"><input type="number" step="0.25" min="0" value="${(e.rate||0).toFixed(2)}" style="width:80px;text-align:right;padding:6px 8px;border:1px solid var(--line);border-radius:7px" onchange="setField('${e.id}','rate',+this.value)"></td>
        <td><button class="toggle ${e.webPunch?'on':''}" onclick="setField('${e.id}','webPunch',${e.webPunch?'false':'true'})" title="${e.webPunch?'Can clock in/out from the web clock':'Biometric clock only'}"><span></span></button></td>
        <td><button class="toggle ${e.remote!==false?'on':''}" onclick="setField('${e.id}','remote',${e.remote!==false?'false':'true'})" title="${e.remote!==false?'Remote — stays signed in on their own device':'On-site terminal — auto-signs-out after each punch'}"><span></span></button></td>
      </tr>`).join('')}
    </tbody></table>
    <div class="hint">Changes save immediately. <b>ID</b>, <b>email</b>, and <b>department</b> are now editable here (no need to open Supabase). <b>State</b> sets meal/break law + overtime (CA daily OT + 7th-day + meal premium; PA/federal weekly). <b>Rate</b> feeds Payroll. <b>Web clock</b> ON lets a remote employee punch from the web clock; OFF means biometric-only. <b>Remote</b> ON = stays signed in on their own device; OFF = on-site terminal that signs out after each punch so the next person enters their own PIN.</div>
  </div>

  <div class="card">
    <h2><i class="ti ti-user-shield"></i> Manager Access</h2>
    <p class="hint" style="margin-bottom:12px">Which employees' timecards each manager can view and approve.</p>
    <table><thead><tr><th>Manager</th><th>Can access</th></tr></thead><tbody>
    ${managers.filter(m=>m.role==='manager').map(m=>`
      <tr>
        <td><div class="who">${m.name}</div><div class="sub">${m.loc} · ${TZ[m.tz]}</div></td>
        <td><div class="chips">${emps.map(e=>{
          const on = (m.manages||[]).includes(e.id);
          return `<button class="chip" style="${on?'background:var(--navy);color:#fff':''}" onclick="toggleAccess('${m.id}','${e.id}')">${on?'✓ ':''}${e.name}</button>`;
        }).join('')}</div></td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}
function setField(id, field, val){ emp(id)[field]=val; Store.updateEmployee(id,{[field]:val}); toast('Saved'); if(field==='mgr'){rebuildManages();} render(); }
function rebuildManages(){
  DB.employees.filter(m=>m.role==='manager').forEach(m=>{
    m.manages = DB.employees.filter(e=>e.mgr===m.id).map(e=>e.id);
  });
}
function toggleAccess(mgrId, empId){
  const m = emp(mgrId); m.manages = m.manages||[];
  if(m.manages.includes(empId)){ m.manages = m.manages.filter(x=>x!==empId); }
  else { m.manages.push(empId); emp(empId).mgr = mgrId; Store.updateEmployee(empId,{mgr:mgrId}); }
  render();
}

/* ---------- toast ---------- */
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

function recomputeAllApprovals(){
  DB.employees.filter(e=>e.role==='employee').forEach(e=>{
    const weeks=new Set(punchesForEmp(e.id).map(p=>weekKeyFor(p.ts,e)));
    weeks.forEach(wk=>recomputeWeekApproval(e.id,wk));
  });
}

function renderLogin(){
  const gate=document.getElementById('gate'); gate.style.display='flex';
  gate.innerHTML=`<div class="gate-card">
    <div class="gate-logo"><i class="ti ti-clock-hour-4"></i></div>
    <h1>WS Time</h1><p>WS Display · sign in with your company email</p>
    <input id="li-email" type="email" placeholder="you@wsdisplay.com" autocomplete="username">
    <input id="li-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="gate-err" id="li-err"></div>
    <button class="gate-btn" id="li-btn" onclick="doLogin()"><i class="ti ti-login-2"></i> Sign in</button>`;
}
async function doLogin(){
  const email=document.getElementById('li-email').value, pass=document.getElementById('li-pass').value;
  const err=document.getElementById('li-err');
  if(!email||!pass){ err.textContent='Enter your email and password'; return; }
  err.textContent='Signing in…';
  const res=await Store.emailLogin(email, pass);
  if(!res.ok){ err.textContent = res.error==='offline' ? 'Offline' : (res.error||'Sign-in failed'); return; }
  await afterAuth();
}
async function afterAuth(){
  const eid=await Store.myEmployeeId();
  if(!eid){ const err=document.getElementById('li-err'); if(err) err.textContent='No employee profile linked to this login — contact HR.'; await Store.signOut(); return; }
  const snap=await Store.loadAll();
  if(snap){ Object.keys(snap).forEach(k=>{ DB[k]=snap[k]; }); }
  CURRENT=eid; AUTHED=true;
  rebuildManages(); recomputeAllApprovals();
  const el=document.getElementById('gate'); if(el) el.style.display='none';
  if(!SCREENS.find(s=>s.id===SCREEN)?.roles.includes(me().role)) SCREEN='dash';
  render();
  Live.start();
}
function portalSignOut(){ if(Store.enabled){ Live.stop(); Store.signOut(); AUTHED=false; CURRENT=null; renderLogin(); } }

async function boot(){
  if(Store.enabled){
    const s=await Store.session();
    if(s){ await afterAuth(); return; }
    renderLogin(); return;
  }
  rebuildManages(); seedState(); render();   // offline demo
}
// close the Download dropdown when clicking anywhere outside it
document.addEventListener('click', (ev)=>{
  document.querySelectorAll('details.dl-menu[open]').forEach(d=>{ if(!d.contains(ev.target)) d.removeAttribute('open'); });
});
boot();
</script>
